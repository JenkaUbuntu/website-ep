<span class="hljs-comment">&lt;!--
# Kontroverse angesichts von Unsicherheiten über die Folgen der Ausrichtung Olympischer Spiele
--&gt;</span>

<span class="hljs-statement-title">[Pro-Olympia-Bewerbung]:</span> Die Stadt München sollte sich um die Ausrichtung der Olympischen Spiele 2036/40/44 bewerben. <span class="hljs-tag">#(pro)</span>
<span class="hljs-comment">&lt;!--  &gt;&lt; [Gegen-Olympia-Bewerbung] --&gt;</span>

<span class="hljs-statement-title">[Gegen-Olympia-Bewerbung]:</span> Die Stadt München sollte sich nicht um die Ausrichtung der Olympischen Spiele 2036/40/44 bewerben. <span class="hljs-tag">#(contra)</span> 

<span class="hljs-section"># Ausgangspunkt: Erwartete Vor- und Nachteile aus der Durchführung der Olympischen Spiele</span>

<span class="hljs-statement-title">[Alle unkontroversen Pro-Gesichtspunkte]:</span> Von der Ausrichtung der Olympischen Spiele in München sind folgende Vorteile zu erwarten: Förderung der Stadtentwicklung, Verbesserung der Inklusion durch Ausbau der Barrierefreiheit, Gewinne für die lokale Wirtschaft sowie einzigartige Erlebnisse für die Stadtbewohner<span class="hljs-meta">\*</span>innen. <span class="hljs-tag">#pro</span>

<span class="hljs-statement-title">[Alle unkontroversen Contra-Gesichtspunkte]:</span> Von der Ausrichtung der Olympischen Spiele in München sind folgende Nachteile zu erwarten: ihre Ausrichtung belastet den Stadthaushalt, sie birgt hohe finanzielle Risiken und die Ausrichtung erfordert Kooperation mit einem unfairen Partner, dem IOC.<span class="hljs-tag">#contra</span>

<span class="hljs-section"># Empirische Bedingungen</span>

<span class="hljs-statement-title">[Zuschüsse vom Bund und Land]:</span> Genau dann, wenn die Stadt München den Zuschlag für die Ausrichtung der Olympischen Spiele bekommt, erhält sie finanzielle Zuschüsse vom Bund und Land für die Realisierung ihrer Infrastrukturprojekte. <span class="hljs-tag">#neutral</span>

<span class="hljs-argument-title">&lt;A1.3.1: Ohne Olympia-Ausrichtung keine Zuschüsse&gt;:</span> Infrastrukturausbau ohne Olympia-Zuschüsse belastet den Stadthaushalt stärker aber vermeidet Risiken aus der Kooperation mit dem IOC.<span class="hljs-tag">#neutral</span>

<span class="hljs-argument-statement-nr">(1)</span> <span class="hljs-statement-title">[Zuschüsse vom Bund und Land]:</span> Genau dann, wenn die Stadt München den Zuschlag für die Ausrichtung der Olympischen Spiele bekommt, erhält sie finanzielle Zuschüsse vom Bund und Land für die Realisierung ihrer Infrastrukturprojekte.
<span class="hljs-inference">----</span>
<span class="hljs-argument-statement-nr">(2)</span> Wenn die Stadt München ihre Infrastrukturprojekte umsetzt und nicht die Olympischen Spiele ausrichtet, erhält sie keine finanziellen Zuschüsse vom Land und Bund.
<span class="hljs-argument-statement-nr">(3)</span> Realisierung von Infrastrukturprojekten der Stadt München ohne die Zuschüsse vom Land und Bund führt zu höherer Belastung von Stadthaushalt.
<span class="hljs-argument-statement-nr">(4)</span> Wenn die Stadt München ihre Infrastrukturprojekte umsetzt und nicht die Olympischen Spiele ausrichtet, geht sie keine Risiken aus der Kooperation mit dem IOC.
<span class="hljs-inference">----</span>
<span class="hljs-argument-statement-nr">(5)</span> Wenn die Stadt München ihre Infrastrukturprojekte umsetzt und nicht die Olympischen Spiele ausrichtet, wird das Stadthaushalt höher belastet und es gibt keine Risiken aus der Kooperation mit dem IOC.

<span class="hljs-section"># Neutrale Entscheidungsprinzipien</span>

<span class="hljs-statement-title">[Normative Grundlage: Prinzip der Chancenergreifung]:</span> Wenn von einer Maßnahme M zu erwarten ist, dass sie sowohl erstrebenswerten Konsequenzen EK als auch zu Nachteilen N führen wird, der erwartete Nutzen bzw. Schaden aus EK oder N aber nicht bestimmbar ist, dann soll M ergriffen werden, wenn gilt: (i) der potentielle Gewinn an gesamtgesellschaftlichem Nutzen aus der Realisierung der Handlungsoption ist insgesamt höher ist als der mögliche Verlust an gesamtgesellschaftlichem Nutzen aus der Realisierung und (ii) die möglichen Verluste aus der Realisierung der Handlungsoption können so aufgeteilt werden, dass niemand von den Betroffenen moralisch signifikant benachteiligt wird und (iii) es gibt keinen anderen Weg als M, die maximal möglichen Vorteile EK mit geringeren Nachteilen als N zu realisieren.

<span class="hljs-statement-title">[Vorsorgeprinzip]:</span> Wenn von einer Maßnahme M zu erwarten ist, dass sie sowohl erstrebenswerten Konsequenzen EK als auch zu Nachteilen N führen wird, der erwartete Nutzen bzw. Schaden aus EK oder N aber nicht bestimmbar ist, dann soll die Maßnahme unterlassen werden, wenn gilt: (i) der schlimmst mögliche Schaden kann deutlich höher werden als der bestmögliche Nutzen und (ii) der schlimmst mögliche Schaden kann derart gravierend werden, dass er nicht ohne moralisch signifikante Benachteiligungen aufgefangen werden kann.

<span class="hljs-section"># Pro-Argumentation unter hoher Ungewissheit</span>

<span class="hljs-argument-title">&lt;A1.3: Finanzielle Zuschüsse wichtiger als Olympia-Risiken&gt;</span><span class="hljs-tag">#pro</span>

<span class="hljs-argument-statement-nr">(1)</span> Wenn die Stadt München ihre Infrastrukturprojekte umsetzt und nicht die Olympischen Spiele ausrichtet, wird das Stadthaushalt höher belastet und es gibt keine Risiken aus der Kooperation mit dem IOC.
<span class="hljs-support"> &lt;+</span> <span class="hljs-argument-title">&lt;A1.3.1: Ohne Olympia-Ausrichtung keine Zuschüsse&gt;</span>
<span class="hljs-argument-statement-nr">(2)</span> <span class="hljs-statement-title">[Zuschüsse für Infrastruktur wichtiger als Olympia-Risiken]:</span> Die zusätzliche Belastung des Stadthaushalts (durch den Wegfall der Zuschüsse) hat insgesamt höhere Nachteile als das Tragen der Risiken aus der Kooperation mit dem IOC.<span class="hljs-tag">#wid</span>
<span class="hljs-contradiction"> &gt;&lt;</span> <span class="hljs-statement-title">[Risiken der IOC-Kooperation schlimmer als Verzicht auf finanzielle Zuschüsse]</span>
<span class="hljs-support"> &lt;+</span> <span class="hljs-argument-title">&lt;Begründung ❓ 😞&gt;</span><span class="hljs-tag">#unkl</span>
<span class="hljs-inference">----</span>
<span class="hljs-argument-statement-nr">(3)</span> Wenn die Stadt München ihre Infrastrukturprojekte umsetzt und nicht die Olympischen Spiele ausrichtet, hat sie größere Nachteile als wenn sie die Olympischen Spiele ausrichtet und dabei die Infrastrukturprojekte umsetzt.
<span class="hljs-argument-statement-nr">(4)</span> Entweder wird die Stadt München ihre Infrastrukturprojekte realisieren und Olympische Spiele ausrichten oder sie wird sie realisieren und keine Olympischen Spiele ausrichten.
<span class="hljs-inference">----</span>
<span class="hljs-argument-statement-nr">(5)</span> <span class="hljs-statement-title">[Optimalität der Olympia-Bewerbung]:</span> Es ist nicht möglich, die Vorteile der Ausrichtung der Olympischen Spiele zu realisieren (Infrastrukturprojekte) und geringere Nachteile als denen, die durch eine erfolgreiche Olympia-Bewerbung entstehen können (Risiken aus der Kooperation mit dem IOC), in Kauf zu nehmen. <span class="hljs-tag">#wid</span>
<span class="hljs-contradiction"> &gt;&lt;</span> <span class="hljs-statement-title">[Bessere Alternative]</span>


<span class="hljs-argument-title">&lt;A2: Argument der Chancen-Ergreifung&gt;</span><span class="hljs-tag">#pro</span>

<span class="hljs-argument-statement-nr">(1)</span> <span class="hljs-statement-title">[Alle unkontroversen Pro-Gesichtspunkte]</span>
<span class="hljs-argument-statement-nr">(2)</span> <span class="hljs-statement-title">[Alle unkontroversen Contra-Gesichtspunkte]</span>
<span class="hljs-argument-statement-nr">(3)</span> <span class="hljs-statement-title">[Normative Grundlage: Prinzip der Chancenergreifung]:</span> Wenn von einer Maßnahme M zu erwarten ist, dass sie sowohl erstrebenswerten Konsequenzen EK als auch zu Nachteilen N führen wird, der erwartete Nutzen bzw. Schaden aus EK oder N aber nicht bestimmbar ist, dann soll M ergriffen werden, wenn gilt: (i) der potentielle Gewinn an gesamtgesellschaftlichem Nutzen aus der Realisierung der Handlungsoption ist insgesamt höher ist als der mögliche Verlust an gesamtgesellschaftlichem Nutzen aus der Realisierung und (ii) die möglichen Verluste aus der Realisierung der Handlungsoption können so aufgeteilt werden, dass niemand von den Betroffenen moralisch signifikant benachteiligt wird und (iii) es gibt keinen anderen Weg als M, die maximal möglichen Vorteile EK mit geringeren Nachteilen als N zu realisieren.
<span class="hljs-argument-statement-nr">(4)</span> Maximal mögliche Gewinne an gesamtgesellschaftlichem Nutzen aus der Ausrichtung der Olympischen Spiele in München -- Infrastrukturausbau, Sporterlebnisse, finanzielle Gewinne -- sind höher als die maximal möglichen Verluste an gesamtgesellschaftlichen Nutzen (Kosten und Finanzrisiken, Risiken aus der Kooperation mit dem IOC).
<span class="hljs-argument-statement-nr">(5)</span> <span class="hljs-statement-title">[Mögliche Verluste sind tragbar]:</span> Die möglichen Verluste an gesamtgesellschaftlichem Nutzen aus der Ausrichtung der Olympischen Spiele (unerwartete finanzielle Belastungen) können, sollten sie auftreten, so aufgeteilt werden, dass dadurch niemand moralisch signifikant benachteiligt wird. <span class="hljs-tag">#(wid)</span> <span class="hljs-meta">{isInMap: false}</span>
<span class="hljs-contradiction">  &gt;&lt;</span> <span class="hljs-statement-title">[maximale Verluste gravierend]</span> <span class="hljs-meta">{isInMap: false}</span>
<span class="hljs-argument-statement-nr">(6)</span> Der erwartete Nutzen der Ausrichtung der Olympischen Spiele (und der Nutzen ihrer Unterlassung) ist nicht bestimmbar.
<span class="hljs-argument-statement-nr">(7)</span>  <span class="hljs-statement-title">[Optimalität der Olympia-Bewerbung]:</span> Es gibt keinen anderen Weg, mit geringeren Nachteilen als denen, die durch eine erfolgreiche Olympia-Bewerbung entstehen können, die positiven Konsequenzen für die Stadt zu realisieren, die von der Ausrichtung der Olympischen Spiele zu erwarten sind.<span class="hljs-tag">#(pro)</span>
<span class="hljs-inference">----</span>
<span class="hljs-argument-statement-nr">(5)</span> <span class="hljs-statement-title">[Pro-Olympia-Bewerbung]</span>

<text text-anchor="start" x="282.94" y="-820.36" font-family="arial" font-weight="bold" font-size="10.00" fill="#000000">Normative Grundlage: Prinzip</text>
<text text-anchor="start" x="295.99" y="-810.36" font-family="arial" font-weight="bold" font-size="10.00" fill="#000000"> der Chancenergreifung</text>
<text text-anchor="start" x="253.76" y="-795.36" font-family="arial" font-size="10.00" fill="#000000">Wenn von einer Maßnahme M zu erwarten</text>
<text text-anchor="start" x="264.04" y="-783.36" font-family="arial" font-size="10.00" fill="#000000"> ist, dass sie sowohl erstrebenswerten</text>
<text text-anchor="start" x="254.02" y="-771.36" font-family="arial" font-size="10.00" fill="#000000"> Konsequenzen EK als auch zu Nachteilen</text>
<text text-anchor="start" x="264.05" y="-759.36" font-family="arial" font-size="10.00" fill="#000000"> N führen wird, der erwartete Nutzen</text>
<text text-anchor="start" x="258.47" y="-747.36" font-family="arial" font-size="10.00" fill="#000000"> bzw. Schaden aus EK oder N aber nicht</text>
<text text-anchor="start" x="266.55" y="-735.36" font-family="arial" font-size="10.00" fill="#000000"> bestimmbar ist, dann soll M ergriffen</text>
<text text-anchor="start" x="268.21" y="-723.36" font-family="arial" font-size="10.00" fill="#000000"> werden, wenn gilt: (i) der potentielle</text>
<text text-anchor="start" x="264.6" y="-711.36" font-family="arial" font-size="10.00" fill="#000000"> Gewinn an gesamtgesellschaftlichem</text>
<text text-anchor="start" x="275.43" y="-699.36" font-family="arial" font-size="10.00" fill="#000000"> Nutzen aus der Realisierung der</text>
<text text-anchor="start" x="263.3" y="-687.36" font-family="arial" font-size="10.00" fill="#000000"> Handlungsoption ist insgesamt höher</text>
<text text-anchor="start" x="278.86" y="-675.36" font-family="arial" font-size="10.00" fill="#000000"> ist als der mögliche Verlust an</text>
<text text-anchor="start" x="263.2" y="-663.36" font-family="arial" font-size="10.00" fill="#000000"> gesamtgesellschaftlichem Nutzen aus</text>
<text text-anchor="start" x="285.99" y="-651.36" font-family="arial" font-size="10.00" fill="#000000"> der Realisierung und (ii) die</text>
<text text-anchor="start" x="284.97" y="-639.36" font-family="arial" font-size="10.00" fill="#000000"> möglichen Verluste aus der</text>
<text text-anchor="start" x="271.82" y="-627.36" font-family="arial" font-size="10.00" fill="#000000"> Realisierung der Handlungsoption</text>
<text text-anchor="start" x="269.68" y="-615.36" font-family="arial" font-size="10.00" fill="#000000"> können so aufgeteilt werden, dass</text>
<text text-anchor="start" x="258.75" y="-603.36" font-family="arial" font-size="10.00" fill="#000000"> niemand von den Betroffenen moralisch</text>
<text text-anchor="start" x="275.15" y="-591.36" font-family="arial" font-size="10.00" fill="#000000"> signifikant benachteiligt wird und</text>
<text text-anchor="start" x="269.04" y="-579.36" font-family="arial" font-size="10.00" fill="#000000"> (iii) es gibt keinen anderen Weg als</text>
<text text-anchor="start" x="261.37" y="-567.36" font-family="arial" font-size="10.00" fill="#000000"> M, die maximal möglichen Vorteile EK</text>
<text text-anchor="start" x="270.71" y="-555.36" font-family="arial" font-size="10.00" fill="#000000"> mit geringeren Nachteilen als N zu</text>
<text text-anchor="start" x="322.67" y="-543.36" font-family="arial" font-size="10.00" fill="#000000"> realisieren.</text>
</g>

<text text-anchor="start" x="86.5" y="-774.36" font-family="arial" font-weight="bold" font-size="10.00" fill="#000000">Vorsorgeprinzip</text>
<text text-anchor="start" x="26.76" y="-757.36" font-family="arial" font-size="10.00" fill="#000000">Wenn von einer Maßnahme M zu erwarten</text>
<text text-anchor="start" x="37.04" y="-745.36" font-family="arial" font-size="10.00" fill="#000000"> ist, dass sie sowohl erstrebenswerten</text>
<text text-anchor="start" x="27.02" y="-733.36" font-family="arial" font-size="10.00" fill="#000000"> Konsequenzen EK als auch zu Nachteilen</text>
<text text-anchor="start" x="37.05" y="-721.36" font-family="arial" font-size="10.00" fill="#000000"> N führen wird, der erwartete Nutzen</text>
<text text-anchor="start" x="31.47" y="-709.36" font-family="arial" font-size="10.00" fill="#000000"> bzw. Schaden aus EK oder N aber nicht</text>
<text text-anchor="start" x="30.1" y="-697.36" font-family="arial" font-size="10.00" fill="#000000"> bestimmbar ist, dann soll die Maßnahme</text>
<text text-anchor="start" x="38.15" y="-685.36" font-family="arial" font-size="10.00" fill="#000000"> unterlassen werden, wenn gilt: (i) der</text>
<text text-anchor="start" x="41.58" y="-673.36" font-family="arial" font-size="10.00" fill="#000000"> schlimmst mögliche Schaden kann</text>
<text text-anchor="start" x="52.97" y="-661.36" font-family="arial" font-size="10.00" fill="#000000"> deutlich höher werden als der</text>
<text text-anchor="start" x="46.59" y="-649.36" font-family="arial" font-size="10.00" fill="#000000"> bestmögliche Nutzen und (ii) der</text>
<text text-anchor="start" x="27.14" y="-637.36" font-family="arial" font-size="10.00" fill="#000000"> schlimmst mögliche Schaden kann derart</text>
<text text-anchor="start" x="35.09" y="-625.36" font-family="arial" font-size="10.00" fill="#000000"> gravierend werden, dass er nicht ohne</text>
<text text-anchor="start" x="72.33" y="-613.36" font-family="arial" font-size="10.00" fill="#000000"> moralisch signifikante</text>
<text text-anchor="start" x="32.02" y="-601.36" font-family="arial" font-size="10.00" fill="#000000"> Benachteiligungen aufgefangen werden</text>
<text text-anchor="start" x="107.88" y="-589.36" font-family="arial" font-size="10.00" fill="#000000"> kann.</text>
</g>
