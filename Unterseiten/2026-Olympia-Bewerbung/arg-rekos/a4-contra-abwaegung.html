<span class="hljs-statement-title">[Gegen-Olympia-Bewerbung]:</span> Die Stadt München sollte sich nicht um die Ausrichtung der Olympischen Spiele 2036/40/44 bewerben. <span class="hljs-tag">#(contra)</span>

<span class="hljs-section">## Unstrittige Pro-Gesichtspunkte</span>

<span class="hljs-statement-title">[Förderung der Stadtentwicklung]</span> <span class="hljs-tag">#pro</span>
<span class="hljs-comment">&lt;!-- &lt;+ [Finanzielle Zuschüsse vom Bund und Land] --&gt;</span>
<span class="hljs-support"> +&gt;</span> <span class="hljs-statement-title">[Alle unkontroversen Pro-Gesichtspunkte]</span>

<span class="hljs-statement-title">[Verbesserung der Inklusion]</span><span class="hljs-tag">#(pro)</span>
<span class="hljs-comment">&lt;!-- &lt;+ [Finanzielle Zuschüsse vom Bund und Land] --&gt;</span>
<span class="hljs-support"> +&gt;</span> <span class="hljs-statement-title">[Alle unkontroversen Pro-Gesichtspunkte]</span>

<span class="hljs-support"> +&gt;</span> <span class="hljs-statement-title">[Alle unkontroversen Pro-Gesichtspunkte]</span>

[Finanzielle Zuschüsse vom Bund und Land]#(pro)--&gt;</span>

<span class="hljs-statement-title">[Alle unkontroversen Contra-Gesichtspunkte]</span><span class="hljs-tag">#contra</span>

<span class="hljs-statement-title">[Olympische Spiele kosten unverhältnismäßig viel]</span><span class="hljs-tag">#(contra)</span>

--&gt;</span>

<span class="hljs-section">## Abwägung Gegen die Olympischen Spiele</span>

<span class="hljs-argument-title">&lt;A4: Kontra-Abwägung&gt;:</span> Nachteile aus der Ausrichtung von Olympischen Spielen überwiegen die Vorteile daraus.<span class="hljs-tag">#(contra)</span>

<span class="hljs-argument-statement-nr">(1)</span> <span class="hljs-statement-title">[Alle unkontroversen Pro-Gesichtspunkte]</span>
<span class="hljs-argument-statement-nr">(2)</span> <span class="hljs-statement-title">[Alle unkontroversen Contra-Gesichtspunkte]</span>
<span class="hljs-argument-statement-nr">(3)</span> <span class="hljs-statement-title">[Abwägungsprinzip]:</span> Wenn von einer Maßnahme M zu erwarten ist, dass sie sowohl erstrebenswerten Konsequenzen EK als auch zu Nachteilen N führen wird, soll die Maßnahme M genau dann durchgeführt werden, wenn gilt: (i) das Herbeiführen der erwünschten Konsequenzen EK ist insgesamt besser als das Vermeiden der erwarteten Nachteile N und (ii) es gibt keinen anderen Weg als M, die Vorteile EK mit geringeren Nachteilen als N zu realisieren.
<span class="hljs-argument-statement-nr">(4)</span> <span class="hljs-statement-title">[Abwägung Kontra-Olympia]:</span> Die erwarteten positiven Konsequenzen aus einer Ausrichtung von Olympischen Spielen in München überwiegen nicht die erwarteten Nachteile aus den Finanzrisiken und der unvermeidbaren Kooperation mit einem unfairen Partner.<span class="hljs-tag">#(contra)</span>
<span class="hljs-support">  &lt;+</span> <span class="hljs-argument-title">&lt;A4.1 Erwartungswert-Argument&gt;:</span> das Aggregat der erwarteten Nachteile ist höher als das Aggregat der erwarteten Vorteile<span class="hljs-tag">#(contra)</span>
<span class="hljs-inference">----</span>
<span class="hljs-argument-statement-nr">(5)</span> <span class="hljs-statement-title">[Gegen-Olympia-Bewerbung]</span>

<span class="hljs-argument-title">&lt;A4.1 Erwartungswert-Argument&gt;</span>

<span class="hljs-argument-statement-nr">(1)</span> Das Herbeiführen der möglichen Vorteile einer Handlungsoption ist dann besser als das Vermeiden ihrer möglichen Nachteile,  wenn der erwartete gesamtgesellschaftliche Nutzen der möglichen Vorteile höher ist als der erwartete gesamtgesellschaftliche Schaden aus den möglichen Nachteilen. 
<span class="hljs-argument-statement-nr">(2)</span> <span class="hljs-statement-title">[erwartete Nachteile überwiegen erwartete Vorteile]:</span> Der erwartete gesamtgesellschaftliche Nutzen aus den möglichen Vorteilen der Ausrichtung Olympischer Spiele -- Infrastrukturausbau, einzigartige Erlebnisse, finanzielle Gewinne für die lokale Wirtschaft -- ist geringer als der erwartete gesamtgesellschaftliche Schaden aus den möglichen Nachteilen der Ausrichtung (Kosten- und Finanzrisiken, Kooperation mit einem unfairen Partner, zusätzliche ökologische Belastungen durch die Spiele).<span class="hljs-tag">#(contra)</span> 
<span class="hljs-inference">----</span>
<span class="hljs-argument-statement-nr">(3)</span> <span class="hljs-statement-title">[Abwägung Kontra-Olympia]</span>

<text text-anchor="start" x="812.94" y="-561.86" font-family="arial" font-weight="bold" font-size="10.00" fill="#000000">Abwägungsprinzip</text>
<text text-anchor="start" x="758.76" y="-544.86" font-family="arial" font-size="10.00" fill="#000000">Wenn von einer Maßnahme M zu erwarten</text>
<text text-anchor="start" x="769.04" y="-532.86" font-family="arial" font-size="10.00" fill="#000000"> ist, dass sie sowohl erstrebenswerten</text>
<text text-anchor="start" x="759.02" y="-520.86" font-family="arial" font-size="10.00" fill="#000000"> Konsequenzen EK als auch zu Nachteilen</text>
<text text-anchor="start" x="767.94" y="-508.86" font-family="arial" font-size="10.00" fill="#000000"> N führen wird, soll die Maßnahme M</text>
<text text-anchor="start" x="759.86" y="-496.86" font-family="arial" font-size="10.00" fill="#000000"> genau dann durchgeführt werden, wenn</text>
<text text-anchor="start" x="786.27" y="-484.86" font-family="arial" font-size="10.00" fill="#000000"> gilt: (i) das Herbeiführen der</text>
<text text-anchor="start" x="770.7" y="-472.86" font-family="arial" font-size="10.00" fill="#000000"> erwünschten Konsequenzen EK ist</text>
<text text-anchor="start" x="761.54" y="-460.86" font-family="arial" font-size="10.00" fill="#000000"> insgesamt besser als das Vermeiden der</text>
<text text-anchor="start" x="777.94" y="-448.86" font-family="arial" font-size="10.00" fill="#000000"> erwarteten Nachteile N und (ii) es</text>
<text text-anchor="start" x="773.76" y="-436.86" font-family="arial" font-size="10.00" fill="#000000"> gibt keinen anderen Weg als M, die</text>
<text text-anchor="start" x="768.76" y="-424.86" font-family="arial" font-size="10.00" fill="#000000"> Vorteile EK mit geringeren Nachteilen</text>
<text text-anchor="start" x="808.22" y="-412.86" font-family="arial" font-size="10.00" fill="#000000"> als N zu realisieren.</text>
</g>

<text text-anchor="start" x="568.55" y="-525.86" font-family="arial" font-weight="bold" font-size="10.00" fill="#000000">Abwägung Kontra&#45;Olympia</text>
<text text-anchor="start" x="539.64" y="-508.86" font-family="arial" font-size="10.00" fill="#000000">Die erwarteten positiven Konsequenzen</text>
<text text-anchor="start" x="538.54" y="-496.86" font-family="arial" font-size="10.00" fill="#000000"> aus einer Ausrichtung von Olympischen</text>
<text text-anchor="start" x="535.76" y="-484.86" font-family="arial" font-size="10.00" fill="#000000"> Spielen in München überwiegen nicht</text>

<text text-anchor="start" x="652.16" y="-196" font-family="arial" font-weight="bold" font-size="10.00" fill="#000000"> Vorteile</text>
<text text-anchor="start" x="585.77" y="-181" font-family="arial" font-size="10.00" fill="#000000">Der erwartete gesamtgesellschaftliche</text>
<text text-anchor="start" x="578.63" y="-169" font-family="arial" font-size="10.00" fill="#000000"> Nutzen aus den möglichen Vorteilen der</text>
<text text-anchor="start" x="593.55" y="-157" font-family="arial" font-size="10.00" fill="#000000"> Ausrichtung Olympischer Spiele &#45;&#45;</text>
<text text-anchor="start" x="597.71" y="-145" font-family="arial" font-size="10.00" fill="#000000"> Infrastrukturausbau, einzigartige</text>
<text text-anchor="start" x="588.55" y="-133" font-family="arial" font-size="10.00" fill="#000000"> Erlebnisse, finanzielle Gewinne für</text>
<text text-anchor="start" x="593.55" y="-121" font-family="arial" font-size="10.00" fill="#000000"> die lokale Wirtschaft &#45;&#45; ist geringer</text>
<text text-anchor="start" x="631.88" y="-109" font-family="arial" font-size="10.00" fill="#000000"> als der erwartete</text>
<text text-anchor="start" x="585.47" y="-97" font-family="arial" font-size="10.00" fill="#000000"> gesamtgesellschaftliche Schaden aus</text>
<text text-anchor="start" x="601.41" y="-85" font-family="arial" font-size="10.00" fill="#000000"> den möglichen Nachteilen der</text>
<text text-anchor="start" x="612.71" y="-73" font-family="arial" font-size="10.00" fill="#000000"> Ausrichtung (Kosten&#45; und</text>
<text text-anchor="start" x="586.88" y="-61" font-family="arial" font-size="10.00" fill="#000000"> Finanzrisiken, Kooperation mit einem</text>
<text text-anchor="start" x="606.04" y="-49" font-family="arial" font-size="10.00" fill="#000000"> unfairen Partner, zusätzliche</text>
<text text-anchor="start" x="590.01" y="-37" font-family="arial" font-size="10.00" fill="#000000"> ökologische Belastungen durch die</text>
<text text-anchor="start" x="652.16" y="-25" font-family="arial" font-size="10.00" fill="#000000"> Spiele).</text>
