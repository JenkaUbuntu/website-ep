<span class="hljs-statement-title">[Pro-Olympia-Bewerbung]:</span> Die Stadt München sollte sich um die Ausrichtung der Olympischen Spiele 2036/40/44 bewerben. <span class="hljs-tag">#(pro)</span>
<span class="hljs-support">  &lt;+</span> <span class="hljs-argument-title">&lt;A1: Pro-Abwägung&gt;</span>
<span class="hljs-contradiction">  &gt;&lt;</span> <span class="hljs-statement-title">[Gegen-Olympia-Bewerbung]</span>

<span class="hljs-statement-title">[Gegen-Olympia-Bewerbung]:</span> Die Stadt München sollte sich nicht um die Ausrichtung der Olympischen Spiele 2036/40/44 bewerben. <span class="hljs-tag">#(contra)</span>

<span class="hljs-statement-title">[Abwägungsprinzip]:</span> Eine Maßnahme M, die zu erwünschten Konsequenzen EK und zu Nachteilen N führt, soll genau dann durchgeführt werden, wenn gilt: (i)
das Herbeiführen der erwünschten Konsequenzen EK ist insgesamt besser als das Vermeiden der erwarteten Nachteile N und (ii) 
es gibt keinen anderen Weg als M, die Vorteile EK mit geringeren Nachteilen als N zu realisieren. <span class="hljs-tag">#neutral</span>

<span class="hljs-statement-title">[Normative Grundlage: Erwarteter Nutzen]:</span> Das Herbeiführen der möglichen Vorteile einer Handlungsoption ist dann besser als das Vermeiden ihrer möglichen Nachteile,  wenn der erwartete gesamtgesellschaftliche Nutzen der möglichen Vorteile höher ist als der erwartete gesamtgesellschaftliche Schaden aus den möglichen Nachteilen. <span class="hljs-tag">#(neutral)</span>

<span class="hljs-section">## Ausgangspunkt: Erwartete Vor- und Nachteile aus der Durchführung der Olympischen Spiele</span>

<span class="hljs-statement-title">[Alle unkontroversen Pro-Gesichtspunkte]:</span> Von der Ausrichtung der Olympischen Spiele in München sind folgende Vorteile zu erwarten: Förderung der Stadtentwicklung, Verbesserung der Inklusion durch Ausbau der Barrierefreiheit, Gewinne für die lokale Wirtschaft sowie einzigartige Erlebnisse für die Stadtbewohner<span class="hljs-meta">\*</span>innen. <span class="hljs-tag">#pro</span>

<span class="hljs-statement-title">[Alle unkontroversen Contra-Gesichtspunkte]:</span> Von der Ausrichtung der Olympischen Spiele in München sind folgende Nachteile zu erwarten: ihre Ausrichtung belastet den Stadthaushalt, sie birgt hohe finanzielle Risiken, zusätzliche ökologische Belastungen und die Ausrichtung erfordert Kooperation mit einem unfairen Partner, dem IOC.<span class="hljs-tag">#contra</span>


<span class="hljs-section">## Abwägungsargument Pro Olympische Spiele</span>

<span class="hljs-argument-title">&lt;A1: Pro-Abwägung&gt;:</span> Vorteile aus der Ausrichtung von Olympischen Spielen überwiegen die Nachteile daraus.<span class="hljs-tag">#(pro)</span>

<span class="hljs-argument-statement-nr">(3)</span> <span class="hljs-statement-title">[Abwägungsprinzip]</span>
<span class="hljs-argument-statement-nr">(4)</span> Trotz der benötigten Investitionen für die Ausrichtung der Olympischen Spiele, der damit verbundenen Finanzrisiken und der Risiken der Einflussnahme durch das IOC ist es insgesamt besser, die einzigartigen Erlebnisse, die mittel- bis langfristigen Vorteile aus dem Ausbau der städtischen Infrastruktur einschließlich der Barrierefreiheit sowie die zusätzlichen Gewinne für die lokale Wirtschaft zu realisieren.<span class="hljs-tag">#(pro)</span>
  <span class="hljs-comment">&lt;!--
  &lt;+ &lt;Nachteile-Debunking-Argument&gt;: Nachteile aus der Ausrichtung Olympischer Spiele sind vernachlässigbar #(pro)--&gt;</span>
<span class="hljs-support">  &lt;+</span> <span class="hljs-argument-title">&lt;A1.1: Erwartungswert-Argument&gt;:</span> Aggregation der Vorteile ist höher als das Aggregat der Nachteile.<span class="hljs-tag">#(pro)</span>
<span class="hljs-argument-statement-nr">(5)</span> Es gibt keinen anderen Weg, mit geringeren Nachteilen als denen, die durch eine erfolgreiche Olympia-Bewerbung entstehen können, die positiven Konsequenzen für die Stadt zu realisieren, die von der Ausrichtung der Olympischen Spiele zu erwarten sind.<span class="hljs-tag">#(pro)</span>
<span class="hljs-inference">----</span>
<span class="hljs-argument-statement-nr">(6)</span> <span class="hljs-statement-title">[Pro-Olympia-Bewerbung]</span>

<span class="hljs-argument-title">&lt;A1.1: Erwartungswert-Argument&gt;</span>

<span class="hljs-argument-statement-nr">(1)</span> <span class="hljs-statement-title">[Normative Grundlage: Erwarteter Nutzen]</span>
<span class="hljs-argument-statement-nr">(2)</span> <span class="hljs-statement-title">[Erwarteter Nutzen aus Vorteilen höher als der erwartete Schaden]:</span> Der erwartete gesamtgesellschaftliche Nutzen aus den möglichen Vorteilen der Ausrichtung Olympischer Spiele -- Infrastrukturausbau, einzigartige Erlebnisse, finanzielle Gewinne für die lokale Wirtschaft -- ist höher als der erwartete gesamtgesellschaftliche Schaden aus den möglichen Nachteilen der Ausrichtung (Kosten- und Finanzrisiken, Kooperation mit einem unfairen Partner). <span class="hljs-tag">.?.</span> <span class="hljs-tag">:disappointed:</span> <span class="hljs-tag">#(wid)</span>
<span class="hljs-support">  &lt;+</span> <span class="hljs-argument-title">&lt;Begründung-Pro&gt;:</span> ❓ 😞 <span class="hljs-tag">#(pro)</span>
<span class="hljs-support">    &lt;+</span> <span class="hljs-statement-title">[Alle unkontroversen Pro-Gesichtspunkte]</span><span class="hljs-tag">#pro</span>
<span class="hljs-support">    &lt;+</span> <span class="hljs-statement-title">[Alle unkontroversen Contra-Gesichtspunkte]</span><span class="hljs-tag">#contra</span>
<span class="hljs-inference">----</span>
<span class="hljs-argument-statement-nr">(3)</span> Trotz der benötigten Investitionen für die Ausrichtung der Olympischen Spiele, der damit verbundenen Finanzrisiken und der Risiken der Einflussnahme durch das IOC ist es insgesamt besser, die einzigartigen Erlebnisse, die mittel- bis langfristigen Vorteile aus dem Ausbau der städtischen Infrastruktur einschließlich der Barrierefreiheit sowie die zusätzlichen Gewinne für die lokale Wirtschaft zu realisieren.<span class="hljs-tag">#(pro)</span>



<span class="hljs-section">## Abwägung Gegen die Olympischen Spiele</span>

<span class="hljs-argument-title">&lt;A4: Kontra-Abwägung&gt;:</span> Nachteile aus der Ausrichtung von Olympischen Spielen überwiegen die Vorteile daraus.<span class="hljs-tag">#(contra)</span>

<span class="hljs-argument-statement-nr">(3)</span> <span class="hljs-statement-title">[Abwägungsprinzip]</span>
<span class="hljs-argument-statement-nr">(4)</span> Die erwarteten positiven Konsequenzen aus einer Ausrichtung von Olympischen Spielen in München überwiegen nicht die erwarteten Nachteile aus den Finanzrisiken und der unvermeidbaren Kooperation mit einem unfairen Partner.<span class="hljs-tag">#(contra)</span>
<span class="hljs-support">  &lt;+</span> <span class="hljs-argument-title">&lt;A4.1 Erwartungswert-Argument&gt;:</span> das Aggregat der erwarteten Nachteile ist höher als das Aggregat der erwarteten Vorteile<span class="hljs-tag">#(contra)</span>
<span class="hljs-inference">----</span>
<span class="hljs-argument-statement-nr">(5)</span> <span class="hljs-statement-title">[Gegen-Olympia-Bewerbung]</span>

<span class="hljs-argument-title">&lt;A4.1 Erwartungswert-Argument&gt;</span>

<span class="hljs-argument-statement-nr">(1)</span> <span class="hljs-statement-title">[Normative Grundlage: Erwarteter Nutzen]</span>
<span class="hljs-argument-statement-nr">(2)</span> <span class="hljs-statement-title">[Erwarteter Schaden aus Nachteilen höher als die erwarteten Vorteile]:</span> Der erwartete gesamtgesellschaftliche Nutzen aus den möglichen Vorteilen der Ausrichtung Olympischer Spiele -- Infrastrukturausbau, einzigartige Erlebnisse, finanzielle Gewinne für die lokale Wirtschaft -- ist geringer als der erwartete gesamtgesellschaftliche Schaden aus den möglichen Nachteilen der Ausrichtung (Kosten- und Finanzrisiken, Kooperation mit einem unfairen Partner, zusätzliche ökologische Belastungen durch die Spiele). <span class="hljs-tag">#(wid)</span> 
<span class="hljs-contradiction">  &gt;&lt;</span> <span class="hljs-statement-title">[Erwarteter Nutzen aus Vorteilen höher als der erwartete Schaden]</span>
<span class="hljs-support">  &lt;+</span> <span class="hljs-argument-title">&lt;Begründung-Contra&gt;:</span> <span class="hljs-tag">.?.</span> <span class="hljs-tag">:disappointed:</span> <span class="hljs-tag">#contra</span>
