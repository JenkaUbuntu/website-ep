<span class="hljs-section"># Dialektik der vorgebrachten Gesichtspunkte für und gegen eine Olympia-Bewerbung Münchens</span>

<span class="hljs-statement-title">[Pro-Olympia-Bewerbung]:</span> Die Stadt München sollte sich um die Ausrichtung der Olympischen Spiele 2036, 40, 44 bewerben. <span class="hljs-tag">#(pro)</span>
<span class="hljs-support"> &lt;+</span> <span class="hljs-statement-title">[Förderung der Stadtentwicklung]</span>
<span class="hljs-support"> &lt;+</span> <span class="hljs-statement-title">[Stärkung von Breitensport]</span>
<span class="hljs-support"> &lt;+</span> <span class="hljs-statement-title">[Kurzfristige Wirtschaftsgewinne]</span>
<span class="hljs-support"> &lt;+</span> <span class="hljs-statement-title">[Verbesserung der Inklusion]</span>
<span class="hljs-support"> &lt;+</span> <span class="hljs-statement-title">[Image-Verbesserung]</span>
<span class="hljs-support"> &lt;+</span> <span class="hljs-statement-title">[Mögliche positive Konsequenzen]</span>
<span class="hljs-support"> &lt;+</span> <span class="hljs-statement-title">[Einzigartige Erlebnisse]</span>
<span class="hljs-attack"> -&gt;</span> <span class="hljs-statement-title">[Gegen-Olympia-Bewerbung]</span>


<span class="hljs-statement-title">[Gegen-Olympia-Bewerbung]:</span> Die Stadt München sollte sich nicht um die Ausrichtung der Olympischen Spiele 2036/40/44 bewerben. <span class="hljs-tag">#(contra)</span>

<span class="hljs-section">## Pro-Gesichtspunkte</span>


<span class="hljs-statement-title">[Förderung der Stadtentwicklung]:</span> Bei einem Zuschlag für die Austragung von Olympischen Spielen in München werden zahlreiche Stadtentwicklungsprojekte realisiert: Wohnungsbau, Mobilitätsinfrastruktur, Sanierung von Sportstätten, Ausbau der Barrierefreiheit in der Stadt, Renaturierungs- und Klimaanpassungsmaßnahmen. <span class="hljs-tag">#pro</span>
<span class="hljs-support"> &lt;+</span> <span class="hljs-statement-title">[Finanzielle Zuschüsse vom Bund und Land]</span>

<span class="hljs-statement-title">[Stärkung von Breitensport]:</span> Durch die Ausrichtung der Olympischen Spiele in München wird der Breitensport gestärkt: Sportstätten werden saniert, der Breitensport erhält neue Impulse und größeren Zulauf.<span class="hljs-tag">#(pro)</span>
<span class="hljs-support"> &lt;+</span> <span class="hljs-statement-title">[Finanzielle Zuschüsse vom Bund und Land]</span>

<span class="hljs-statement-title">[Verbesserung der Inklusion]:</span> Für die Ausrichtung der Olympischen Spiele wird Barrierefreiheit in der Stadt ausgebaut.<span class="hljs-tag">#(pro)</span>
<span class="hljs-support"> &lt;+</span> <span class="hljs-statement-title">[Finanzielle Zuschüsse vom Bund und Land]</span>

<span class="hljs-statement-title">[Kurzfristige Wirtschaftsgewinne]:</span>  Von der Ausrichtung der Olympischen Spiele in München profitiert möglicherweise die lokale Wirtschaft.<span class="hljs-tag">#(pro)</span>

<span class="hljs-statement-title">[Einzigartige Erlebnisse]:</span> Die Spiele selbst schaffen einzigartige emotionale Erlebnisse in der ganzen Stadt.<span class="hljs-tag">#(pro)</span>

<span class="hljs-statement-title">[Image-Verbesserung]:</span> München wird positiver und leistungsstärker wahrgenommen. Das Ansehen der Stadt wird noch weiter gefestigt. <span class="hljs-tag">#pro</span>

<span class="hljs-statement-title">[Mögliche positive Konsequenzen]:</span> Olympische Spiele in München können positive soziale Dynamiken auslösen, wie das vergangene Sportgroßveranstaltungen gezeigt haben: einen Schulterschluss in der Gesellschaft, Aufbruchstimmung und großer Mut zu Neuem. <span class="hljs-tag">#(pro)</span>


<span class="hljs-statement-title">[Finanzielle Zuschüsse vom Bund und Land]:</span> Beim Zuschlag für die Ausrichtung der Spiele werden Bund und Land zusätzliche Finanzmittel bereitstellen, die die Stadtentwicklung beschleunigen und die Kommunalfinanzen entlasten.<span class="hljs-tag">#(pro)</span>

<span class="hljs-section">## Widersprüche gegen Kontra-Gesichtspunkte</span>

<span class="hljs-statement-title">[Nachhaltige Olympische Spiele]:</span> Die Wettkampfstätten werden nachhaltig geplant.<span class="hljs-tag">#(pro)</span>
 
<span class="hljs-section">## Kontra-Gesichtspunkte</span>


<span class="hljs-statement-title">[Olympische Spiele kosten unverhältnismäßig viel]</span><span class="hljs-tag">#(contra)</span>
<span class="hljs-support"> &lt;+</span> <span class="hljs-statement-title">[Zusätzliche Kosten für den Stadthaushalt]:</span> Der Ausbau von Sportstätten auf Olympia-Niveau wird den Stadthaushalt stark belasten und wichtigere Projekte aufschieben.<span class="hljs-tag">#(contra)</span> 
<span class="hljs-support"> &lt;+</span> <span class="hljs-statement-title">[Finanzrisiken]:</span> Es besteht die Gefahr, dass die tatsächlichen Kosten für die Durchführung der Olympischen Spiele höher ausfallen werden als geschätzt und dass sie von der Stadt München getragen werden müssen. <span class="hljs-tag">#(contra)</span>
<span class="hljs-support"> +&gt;</span> <span class="hljs-statement-title">[Gegen-Olympia-Bewerbung]</span>


<span class="hljs-statement-title">[Das IOC ist ein unfairer Partner, mit dem nicht kooperiert werden sollte]</span><span class="hljs-tag">#(contra)</span>
<span class="hljs-support"> &lt;+</span> <span class="hljs-statement-title">[Gefahr einer Abhängigkeit vom IOC]:</span> Städte, die Olympische Spiele ausrichten, müssen Verträge unterzeichnen, die dem IOC umfassende Rechte einräumen -- etwa bei der Nutzung öffentlicher Flächen, der Werbung oder der Sicherheit. Diese Verträge können die Stadt daran hindern, die Spiele so auszurichten, wie sie sie ursprünglich geplant haben. <span class="hljs-tag">#contra</span>
<span class="hljs-support"> &lt;+</span> <span class="hljs-statement-title">[Unfaire Verteilung der Gewinne]:</span> Gewinner sind vor allem die IOC-Sponsoren, nicht die lokale Wirtschaft. <span class="hljs-tag">#(contra)</span>
<span class="hljs-support"> +&gt;</span> <span class="hljs-statement-title">[Gegen-Olympia-Bewerbung]</span>

 <span class="hljs-statement-title">[Ökologische Belastungen durch Olympische Spiele]</span><span class="hljs-tag">#contra</span>
<span class="hljs-support">  &lt;+</span> <span class="hljs-statement-title">[Ressourcenverschwendung durch temporäre Sportanlagen]:</span> Ausrichtung der Spiele würde erfordern, dass temporäre Sportstätten gebaut werden.<span class="hljs-tag">#(contra)</span>
<span class="hljs-support">  &lt;+</span> <span class="hljs-statement-title">[Eingriffe in schützenswerte Natur]:</span> In Daglfing soll für das Olympische Dorf Ackerboden versiegelt werden. Dort wachsen heute regionale Lebensmittel, dort leben bedrohte Tierarten. Diese ökologisch sensiblen Flächen für ein zweiwöchiges Event zu opfern, ist unverantwortlich.<span class="hljs-tag">#(contra)</span>
<span class="hljs-support">  +&gt;</span> <span class="hljs-statement-title">[Gegen-Olympia-Bewerbung]</span>
<span class="hljs-attack">  &lt;-</span> <span class="hljs-statement-title">[Nachhaltige Olympische Spiele]</span>

<span class="hljs-section">## Widersprüche gegen Pro-Gesichtspunkte</span>

<span class="hljs-statement-title">[Erfahrungen bisheriger Sportgroßveranstaltungen nicht übertragbar auf Olympia]</span><span class="hljs-tag">#contra</span>
<span class="hljs-attack"> -&gt;</span> <span class="hljs-statement-title">[Mögliche positive Konsequenzen]</span>

<span class="hljs-statement-title">[München braucht keine zusätzlichen Image-Kampagnen]</span><span class="hljs-tag">#contra</span>
<span class="hljs-attack"> -&gt;</span> <span class="hljs-statement-title">[Image-Verbesserung]</span>

<span class="hljs-statement-title">[Keine Vorteile für den Breitensport durch die Olympische Spiele]</span><span class="hljs-tag">#contra</span>
<span class="hljs-attack"> -&gt;</span> <span class="hljs-statement-title">[Stärkung von Breitensport]</span>
