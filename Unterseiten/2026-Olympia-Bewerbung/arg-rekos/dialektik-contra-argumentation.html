<span class="hljs-statement-title">[Gegen-Olympia-Bewerbung]:</span> Die Stadt München sollte sich nicht um die Ausrichtung der Olympischen Spiele 2036/40/44 bewerben. <span class="hljs-tag">#(contra)</span>

<span class="hljs-statement-title">[Alle unkontroversen Pro-Gesichtspunkte]:</span> Von der Ausrichtung der Olympischen Spiele in München sind folgende Vorteile zu erwarten: Förderung der Stadtentwicklung, Verbesserung der Inklusion durch Ausbau der Barrierefreiheit, Gewinne für die lokale Wirtschaft sowie einzigartige Erlebnisse für die Stadtbewohner<span class="hljs-meta">\*</span>innen. <span class="hljs-tag">#pro</span>

<span class="hljs-statement-title">[Alle unkontroversen Contra-Gesichtspunkte]:</span> Von der Ausrichtung der Olympischen Spiele in München sind folgende Nachteile zu erwarten: ihre Ausrichtung belastet den Stadthaushalt, sie birgt hohe finanzielle Risiken, zusätzliche ökologische Belastungen und die Ausrichtung erfordert Kooperation mit einem unfairen Partner, dem IOC.<span class="hljs-tag">#contra</span>



<span class="hljs-section">## Abwägung Gegen die Olympischen Spiele</span>

<span class="hljs-argument-title">&lt;A4: Kontra-Abwägung&gt;:</span> Nachteile aus der Ausrichtung von Olympischen Spielen überwiegen die Vorteile daraus.<span class="hljs-tag">#(contra)</span>

<span class="hljs-argument-statement-nr">(1)</span> <span class="hljs-statement-title">[Alle unkontroversen Pro-Gesichtspunkte]</span>
<span class="hljs-argument-statement-nr">(2)</span> <span class="hljs-statement-title">[Alle unkontroversen Contra-Gesichtspunkte]</span>
<span class="hljs-argument-statement-nr">(3)</span> <span class="hljs-statement-title">[Abwägungsprinzip]:</span> Wenn von einer Maßnahme M zu erwarten ist, dass sie sowohl erstrebenswerten Konsequenzen EK als auch zu Nachteilen N führen wird, soll die Maßnahme M genau dann durchgeführt werden, wenn gilt: (i) das Herbeiführen der erwünschten Konsequenzen EK ist insgesamt besser als das Vermeiden der erwarteten Nachteile N und (ii) es gibt keinen anderen Weg als M, die Vorteile EK mit geringeren Nachteilen als N zu realisieren.
<span class="hljs-argument-statement-nr">(4)</span> <span class="hljs-statement-title">[Abwägung Kontra-Olympia]:</span> Die erwarteten positiven Konsequenzen aus einer Ausrichtung von Olympischen Spielen in München überwiegen nicht die erwarteten Nachteile aus den Finanzrisiken und der unvermeidbaren Kooperation mit einem unfairen Partner.<span class="hljs-tag">#(contra)</span>
<span class="hljs-support">  &lt;+</span> <span class="hljs-argument-title">&lt;A4.1 Erwartungswert-Argument&gt;:</span> das Aggregat der erwarteten Nachteile ist höher als das Aggregat der erwarteten Vorteile<span class="hljs-tag">#(contra)</span>
<span class="hljs-inference">----</span>
<span class="hljs-argument-statement-nr">(5)</span> <span class="hljs-statement-title">[Gegen-Olympia-Bewerbung]</span>

<span class="hljs-argument-title">&lt;A4.1 Erwartungswert-Argument&gt;</span>

<span class="hljs-argument-statement-nr">(1)</span> Das Herbeiführen der möglichen Vorteile einer Handlungsoption ist dann besser als das Vermeiden ihrer möglichen Nachteile,  wenn der erwartete gesamtgesellschaftliche Nutzen der möglichen Vorteile höher ist als der erwartete gesamtgesellschaftliche Schaden aus den möglichen Nachteilen. 
<span class="hljs-argument-statement-nr">(2)</span> <span class="hljs-statement-title">[erwartete Nachteile überwiegen erwartete Vorteile]:</span> Der erwartete gesamtgesellschaftliche Nutzen aus den möglichen Vorteilen der Ausrichtung Olympischer Spiele -- Infrastrukturausbau, einzigartige Erlebnisse, finanzielle Gewinne für die lokale Wirtschaft -- ist geringer als der erwartete gesamtgesellschaftliche Schaden aus den möglichen Nachteilen der Ausrichtung (Kosten- und Finanzrisiken, Kooperation mit einem unfairen Partner, zusätzliche ökologische Belastungen durch die Spiele).<span class="hljs-tag">#(contra)</span> 
<span class="hljs-inference">----</span>
<span class="hljs-argument-statement-nr">(3)</span> <span class="hljs-statement-title">[Abwägung Kontra-Olympia]</span>


<span class="hljs-argument-title">&lt;A5: Bessere Alternativen&gt;:</span> Es ist besser, die Stadtinfrastruktur unabhängig von der Ausrichtung Olympischer Spiele auszubauen.<span class="hljs-tag">#contra</span>

<span class="hljs-argument-statement-nr">(1)</span> <span class="hljs-statement-title">[Alle unkontroversen Pro-Gesichtspunkte]</span>
<span class="hljs-argument-statement-nr">(2)</span> <span class="hljs-statement-title">[Alle unkontroversen Contra-Gesichtspunkte]</span>
<span class="hljs-argument-statement-nr">(3)</span> <span class="hljs-statement-title">[Abwägungsprinzip]</span>
<span class="hljs-argument-statement-nr">(4)</span> <span class="hljs-statement-title">[Bessere Alternativen]:</span> Wenn die Stadt München die Infrastrukturvorhaben, die sie im Zuge der Olympia-Ausrichtung realisieren will, vollständig selbst finanziert, hat sie insgesamt geringere Nachteile zu tragen als durch ihre Realisierung mittels Olympia-Ausrichtung, auch wenn dadurch auf einmalige Erlebnisse verzichtet wird.<span class="hljs-tag">#(contra)</span>
<span class="hljs-inference">----</span>
<span class="hljs-argument-statement-nr">(5)</span> <span class="hljs-statement-title">[Gegen-Olympia-Bewerbung]</span>

<span class="hljs-argument-title">&lt;A5.1: Infrastrukturausbau unabhängig von Olympia&gt;:</span> Es ist besser für die Stadt München, ihre Infrastrukturmaßnahmen selbst zu finanzieren.<span class="hljs-tag">#(contra)</span>

<span class="hljs-argument-statement-nr">(1)</span> Wenn die Stadt München ihre Infrastrukturprojekte umsetzt und nicht die Olympischen Spiele ausrichtet, wird das Stadthaushalt höher belastet und es gibt keine Risiken aus der Kooperation mit dem IOC.
<span class="hljs-support"> &lt;+</span> <span class="hljs-argument-title">&lt;A5.1.1: Ohne Olympia-Ausrichtung keine Zuschüsse&gt;</span>
<span class="hljs-argument-statement-nr">(2)</span> <span class="hljs-statement-title">[Risiken der IOC-Kooperation schlimmer als Verzicht auf finanzielle Zuschüsse]:</span> Die zusätzliche Belastung des Stadthaushalts (durch den Wegfall der Zuschüsse) für die Realisierung der Infrastrukturvorhaben ist insgesamt leichter zu bewältigen als das Tragen der Risiken aus der Kooperation mit dem IOC.<span class="hljs-tag">#(contra)</span>
<span class="hljs-inference">----</span>
<span class="hljs-argument-statement-nr">(3)</span> Wenn die Stadt München ihre Infrastrukturprojekte umsetzt und nicht die Olympischen Spiele ausrichtet, hat sie größere Nachteile als wenn sie die Olympischen Spiele ausrichtet und dabei die Infrastrukturprojekte umsetzt.
<span class="hljs-inference">----</span>
<span class="hljs-argument-statement-nr">(4)</span> <span class="hljs-statement-title">[Bessere Alternativen]:</span> Wenn die Stadt München die Infrastrukturvorhaben, die sie im Zuge der Olympia-Ausrichtung realisieren will, vollständig selbst finanziert, hat sie insgesamt geringere Nachteile zu tragen als durch ihre Realisierung mittels Olympia-Ausrichtung, auch wenn dadurch auf einmalige Erlebnisse verzichtet wird.<span class="hljs-tag">#(contra)</span>

<span class="hljs-argument-title">&lt;A5.1.1: Ohne Olympia-Ausrichtung keine Zuschüsse&gt;:</span> Wenn die Stadt München ihre Infrastrukturprojekte umsetzt und nicht die Olympischen Spiele ausrichtet, wird das Stadthaushalt höher belastet und es gibt keine Risiken aus der Kooperation mit dem IOC.

<span class="hljs-argument-statement-nr">(1)</span> <span class="hljs-statement-title">[Zuschüsse vom Bund und Land]:</span> Genau dann, wenn die Stadt München den Zuschlag für die Ausrichtung der Olympischen Spiele bekommt, erhält sie finanzielle Zuschüsse vom Bund und Land für die Realisierung ihrer Infrastrukturprojekte.
<span class="hljs-inference">----</span>
<span class="hljs-argument-statement-nr">(2)</span> Wenn die Stadt München ihre Infrastrukturprojekte umsetzt und nicht die Olympischen Spiele ausrichtet, erhält sie keine finanziellen Zuschüsse vom Land und Bund.
<span class="hljs-argument-statement-nr">(3)</span> Realisierung von Infrastrukturprojekten der Stadt München ohne die Zuschüsse vom Land und Bund führt zu höherer Belastung von Stadthaushalt.
<span class="hljs-argument-statement-nr">(4)</span> Wenn die Stadt München ihre Infrastrukturprojekte umsetzt und nicht die Olympischen Spiele ausrichtet, geht sie keine Risiken aus der Kooperation mit dem IOC.
<span class="hljs-inference">----</span>
<span class="hljs-argument-statement-nr">(5)</span> Wenn die Stadt München ihre Infrastrukturprojekte umsetzt und nicht die Olympischen Spiele ausrichtet, wird das Stadthaushalt höher belastet und es gibt keine Risiken aus der Kooperation mit dem IOC.

<span class="hljs-section">## Argumentation unter Ungewissheit</span>

<span class="hljs-argument-title">&lt;A6 Risiken-Minimierung&gt;:</span> die schlimmst möglichen Nachteile aus einer Kooperation mit dem IOC sind derart gravierend, dass es insgesamt besser ist, sie gar nicht zuzulassen.<span class="hljs-tag">#(contra)</span>

<span class="hljs-argument-statement-nr">(1)</span> <span class="hljs-statement-title">[Alle unkontroversen Pro-Gesichtspunkte]</span>
<span class="hljs-argument-statement-nr">(2)</span> <span class="hljs-statement-title">[Alle unkontroversen Contra-Gesichtspunkte]</span>
<span class="hljs-argument-statement-nr">(3)</span> <span class="hljs-statement-title">[Normative Grundlage: Vorsorgeprinzip]:</span> Wenn von einer Maßnahme M zu erwarten ist, dass sie sowohl erstrebenswerten Konsequenzen EK als auch zu Nachteilen N führen wird, der erwartete Nutzen bzw. Schaden aus EK oder N aber nicht bestimmbar ist, dann soll die Maßnahme unterlassen werden, wenn gilt: (i) der schlimmst mögliche Schaden kann deutlich höher werden als der bestmögliche Nutzen und (ii) der schlimmst mögliche Schaden kann derart gravierend werden, dass er nicht ohne moralisch signifikante Benachteiligungen aufgefangen werden kann.
<span class="hljs-argument-statement-nr">(4)</span> Der erwartete Nutzen der Ausrichtung der Olympischen Spiele (und der Nutzen ihrer Unterlassung) ist nicht bestimmbar.
<span class="hljs-argument-statement-nr">(5)</span> Die maximal möglichen Verluste an gesamtgesellschaftlichem Nutzen aus der Ausrichtung der Olympischen Spiele -- ökologische Schäden sowie unerwartete finanzielle Belastungen -- können deutlich höher ausfallen als die maximal möglichen Gewinne -- Infrastrukturausbau, Sporterlebnisse, finanzielle Gewinne.
<span class="hljs-argument-statement-nr">(6)</span> Die maximal möglichen Verluste aus der Ausrichtung der Olympischen Spiele können derart gravierend werden, dass ihr Auffangen zu moralisch signifikanten Benachteiligungen führen wird. 
<span class="hljs-inference">----</span>
<span class="hljs-argument-statement-nr">(7)</span> <span class="hljs-statement-title">[Gegen-Olympia-Bewerbung]</span>

<span class="hljs-argument-title">&lt;A6.1.1. Das IOC ist ein unfairer Kooperationspartner&gt;:</span> Das IOC priorisiert das Ziel möglichst hoher Einnahmen durch die Olympischen Spiele.<span class="hljs-tag">#(contra)</span>

<span class="hljs-argument-statement-nr">(1)</span> Beim IOC spielt das Interesse, mit den Olympischen Spielen, möglichst hohe Einnahmen zu generieren, eine prioritäre Rolle.
<span class="hljs-argument-statement-nr">(2)</span> Wenn ein Ausrichter einer Veranstaltung das Ziel Z priorisiert, dann ist damit zu rechnen, dass der Ausrichter bei Zielkonflikten häufig für die Realisierung von Z entscheiden wird. 
<span class="hljs-argument-statement-nr">(3)</span> Bei der Festlegung des Konzepts der Olympischen Spiele zwischen der Stadt München und dem IOC ist mit zahlreichen Konflikten zwischen dem Finanzinteresse des IOC und den Zielen der Stadt München (Nachhaltigkeit, Kostenreduktion) zu rechnen. 
<span class="hljs-inference">----</span>
<span class="hljs-argument-statement-nr">(4)</span> <span class="hljs-statement-title">[Risiko aus der Gewinnorientierung des IOC]:</span> Bei der Festlegung des Konzepts der Olympischen Spiele ist damit zu rechnen, dass das IOC auf zahlreichen Lösungen besteht, die die IOC-Einnahmen maximieren und die Spiele für die Stadt München teurer  und weniger nachhaltig machen. <span class="hljs-tag">#(contra)</span>

<span class="hljs-argument-title">&lt;A6.1: Finanzielle Risiken für die Stadt München aus einer Kooperation mit dem IOC&gt;</span><span class="hljs-tag">#contra</span>

<span class="hljs-argument-statement-nr">(4)</span> <span class="hljs-statement-title">[Risiko aus der Gewinnorientierung des IOC]:</span> Bei der Festlegung des Konzepts der Olympischen Spiele ist damit zu rechnen, dass das IOC auf zahlreichen Lösungen besteht, die die IOC-Einnahmen maximieren und die Spiele für die Stadt München teurer  und weniger nachhaltig machen. 
<span class="hljs-argument-statement-nr">(5)</span> Wenn da IOC auf zahlreichen Lösungen besteht, die die Spiele die Spiele für die Stadt München teurer  und weniger nachhaltig machen, können die Verluste aus der Ausrichtung der Spiele die Gewinne deutlich übertreffen.
<span class="hljs-inference">----</span>
<span class="hljs-argument-statement-nr">(6)</span> Die maximal möglichen Verluste an gesamtgesellschaftlichem Nutzen aus der Ausrichtung der Olympischen Spiele -- ökologische Schäden sowie unerwartete finanzielle Belastungen -- können deutlich höher ausfallen als die maximal möglichen Gewinne -- Infrastrukturausbau, Sporterlebnisse, finanzielle Gewinne.
<span class="hljs-support"> +&gt;</span> <span class="hljs-argument-title">&lt;A6 Risiken-Minimierung&gt;</span>

<text text-anchor="start" x="566.04" y="-291.96" font-family="arial" font-size="10.00" fill="#000000">Der erwartete gesamtgesellschaftliche Nutzen</text>

<text text-anchor="start" x="578.55" y="-243.96" font-family="arial" font-size="10.00" fill="#000000"> Gewinne für die lokale Wirtschaft &#45;&#45; ist</text>
<text text-anchor="start" x="609.66" y="-231.96" font-family="arial" font-size="10.00" fill="#000000"> geringer als der erwartete</text>
<text text-anchor="start" x="573.25" y="-219.96" font-family="arial" font-size="10.00" fill="#000000"> gesamtgesellschaftliche Schaden aus den</text>
<text text-anchor="start" x="580.86" y="-207.96" font-family="arial" font-size="10.00" fill="#000000"> möglichen Nachteilen der Ausrichtung</text>
<text text-anchor="start" x="569.37" y="-195.96" font-family="arial" font-size="10.00" fill="#000000"> (Kosten&#45; und Finanzrisiken, Kooperation mit</text>
<text text-anchor="start" x="588.54" y="-183.96" font-family="arial" font-size="10.00" fill="#000000"> einem unfairen Partner, zusätzliche</text>
<text text-anchor="start" x="569.18" y="-171.96" font-family="arial" font-size="10.00" fill="#000000"> ökologische Belastungen durch die Spiele).</text>

<text text-anchor="start" x="95.38" y="-677.91" font-family="arial" font-weight="bold" font-size="10.00" fill="#000000">Bessere Alternativen</text>
<text text-anchor="start" x="73.43" y="-660.91" font-family="arial" font-size="10.00" fill="#000000">Wenn die Stadt München die</text>
<text text-anchor="start" x="47.31" y="-648.91" font-family="arial" font-size="10.00" fill="#000000"> Infrastrukturvorhaben, die sie im Zuge der</text>
<text text-anchor="start" x="59.56" y="-636.91" font-family="arial" font-size="10.00" fill="#000000"> Olympia&#45;Ausrichtung realisieren will,</text>
<text text-anchor="start" x="63.15" y="-624.91" font-family="arial" font-size="10.00" fill="#000000"> vollständig selbst finanziert, hat sie</text>
<text text-anchor="start" x="42.59" y="-612.91" font-family="arial" font-size="10.00" fill="#000000"> insgesamt geringere Nachteile zu tragen als</text>
<text text-anchor="start" x="72.88" y="-600.91" font-family="arial" font-size="10.00" fill="#000000"> durch ihre Realisierung mittels</text>
<text text-anchor="start" x="38.97" y="-588.91" font-family="arial" font-size="10.00" fill="#000000"> Olympia&#45;Ausrichtung, auch wenn dadurch auf</text>
<text text-anchor="start" x="59.27" y="-576.91" font-family="arial" font-size="10.00" fill="#000000"> einmalige Erlebnisse verzichtet wird.</text>
</g>

<text text-anchor="start" x="34.93" y="-227.96" font-family="arial" font-size="10.00" fill="#000000"> Realisierung der Infrastrukturvorhaben ist</text>
<text text-anchor="start" x="37.43" y="-215.96" font-family="arial" font-size="10.00" fill="#000000"> insgesamt leichter zu bewältigen als das</text>
<text text-anchor="start" x="29.93" y="-203.96" font-family="arial" font-size="10.00" fill="#000000"> Tragen der Risiken aus der Kooperation mit</text>

<text text-anchor="start" x="1571.1" y="-711.91" font-family="arial" font-weight="bold" font-size="10.00" fill="#000000">Normative Grundlage:</text>
<text text-anchor="start" x="1583.61" y="-701.91" font-family="arial" font-weight="bold" font-size="10.00" fill="#000000"> Vorsorgeprinzip</text>
<text text-anchor="start" x="1517.48" y="-686.91" font-family="arial" font-size="10.00" fill="#000000">Wenn von einer Maßnahme M zu erwarten ist,</text>
<text text-anchor="start" x="1543.32" y="-674.91" font-family="arial" font-size="10.00" fill="#000000"> dass sie sowohl erstrebenswerten</text>
<text text-anchor="start" x="1520.52" y="-662.91" font-family="arial" font-size="10.00" fill="#000000"> Konsequenzen EK als auch zu Nachteilen N</text>
<text text-anchor="start" x="1528.88" y="-650.91" font-family="arial" font-size="10.00" fill="#000000"> führen wird, der erwartete Nutzen bzw.</text>
<text text-anchor="start" x="1514.14" y="-638.91" font-family="arial" font-size="10.00" fill="#000000"> Schaden aus EK oder N aber nicht bestimmbar</text>
<text text-anchor="start" x="1528.87" y="-626.91" font-family="arial" font-size="10.00" fill="#000000"> ist, dann soll die Maßnahme unterlassen</text>
<text text-anchor="start" x="1540.28" y="-614.91" font-family="arial" font-size="10.00" fill="#000000"> werden, wenn gilt: (i) der schlimmst</text>
<text text-anchor="start" x="1511.55" y="-602.91" font-family="arial" font-size="10.00" fill="#000000"> mögliche Schaden kann deutlich höher werden</text>
<text text-anchor="start" x="1528.69" y="-590.91" font-family="arial" font-size="10.00" fill="#000000"> als der bestmögliche Nutzen und (ii) der</text>
<text text-anchor="start" x="1525.64" y="-578.91" font-family="arial" font-size="10.00" fill="#000000"> schlimmst mögliche Schaden kann derart</text>
<text text-anchor="start" x="1533.59" y="-566.91" font-family="arial" font-size="10.00" fill="#000000"> gravierend werden, dass er nicht ohne</text>
<text text-anchor="start" x="1528.31" y="-554.91" font-family="arial" font-size="10.00" fill="#000000"> moralisch signifikante Benachteiligungen</text>
<text text-anchor="start" x="1559.42" y="-542.91" font-family="arial" font-size="10.00" fill="#000000"> aufgefangen werden kann.</text>
</g>
