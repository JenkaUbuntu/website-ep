# Kontroverse angesichts von Unsicherheiten über die Folgen der Ausrichtung Olympischer Spiele
--&gt;</span>

<span class="hljs-statement-title">[Pro-Olympia-Bewerbung]:</span> Die Stadt München sollte sich um die Ausrichtung der Olympischen Spiele 2036/40/44 bewerben. <span class="hljs-tag">#(pro)</span>
<span class="hljs-comment">&lt;!--  &gt;&lt; [Gegen-Olympia-Bewerbung] --&gt;</span>

<span class="hljs-statement-title">[Gegen-Olympia-Bewerbung]:</span> Die Stadt München sollte sich nicht um die Ausrichtung der Olympischen Spiele 2036/40/44 bewerben. <span class="hljs-tag">#(contra)</span> 

<span class="hljs-section">## Ausgangspunkt: Erwartete Vor- und Nachteile aus der Durchführung der Olympischen Spiele</span>

<span class="hljs-statement-title">[Alle unkontroversen Pro-Gesichtspunkte]:</span> Von der Ausrichtung der Olympischen Spiele in München sind folgende Vorteile zu erwarten: Förderung der Stadtentwicklung, Verbesserung der Inklusion durch Ausbau der Barrierefreiheit, Gewinne für die lokale Wirtschaft sowie einzigartige Erlebnisse für die Stadtbewohner<span class="hljs-meta">\*</span>innen. <span class="hljs-tag">#pro</span>

<span class="hljs-statement-title">[Alle unkontroversen Contra-Gesichtspunkte]:</span> Von der Ausrichtung der Olympischen Spiele in München sind folgende Nachteile zu erwarten: ihre Ausrichtung belastet den Stadthaushalt, sie birgt hohe finanzielle Risiken und die Ausrichtung erfordert Kooperation mit einem unfairen Partner, dem IOC.<span class="hljs-tag">#contra</span>

<span class="hljs-section">## Empirische Bedingungen</span>

<span class="hljs-statement-title">[Zuschüsse vom Bund und Land]:</span> Genau dann, wenn die Stadt München den Zuschlag für die Ausrichtung der Olympischen Spiele bekommt, erhält sie finanzielle Zuschüsse vom Bund und Land für die Realisierung ihrer Infrastrukturprojekte. <span class="hljs-tag">#neutral</span> <span class="hljs-meta">{isInMap: false}</span>

<span class="hljs-argument-title">&lt;A1.3.1: Ohne Olympia-Ausrichtung keine Zuschüsse&gt;:</span> Infrastrukturausbau ohne Olympia-Zuschüsse belastet den Stadthaushalt stärker aber vermeidet Risiken aus der Kooperation mit dem IOC.<span class="hljs-tag">#neutral</span> <span class="hljs-meta">{isInMap: false}</span>

<span class="hljs-argument-statement-nr">(1)</span> <span class="hljs-statement-title">[Zuschüsse vom Bund und Land]:</span> Genau dann, wenn die Stadt München den Zuschlag für die Ausrichtung der Olympischen Spiele bekommt, erhält sie finanzielle Zuschüsse vom Bund und Land für die Realisierung ihrer Infrastrukturprojekte.
<span class="hljs-inference">----</span>
<span class="hljs-argument-statement-nr">(2)</span> Wenn die Stadt München ihre Infrastrukturprojekte umsetzt und nicht die Olympischen Spiele ausrichtet, erhält sie keine finanziellen Zuschüsse vom Land und Bund.
<span class="hljs-argument-statement-nr">(3)</span> Realisierung von Infrastrukturprojekten der Stadt München ohne die Zuschüsse vom Land und Bund führt zu höherer Belastung von Stadthaushalt.
<span class="hljs-argument-statement-nr">(4)</span> Wenn die Stadt München ihre Infrastrukturprojekte umsetzt und nicht die Olympischen Spiele ausrichtet, geht sie keine Risiken aus der Kooperation mit dem IOC.
<span class="hljs-inference">----</span>
<span class="hljs-argument-statement-nr">(5)</span> Wenn die Stadt München ihre Infrastrukturprojekte umsetzt und nicht die Olympischen Spiele ausrichtet, wird das Stadthaushalt höher belastet und es gibt keine Risiken aus der Kooperation mit dem IOC.

<span class="hljs-section">## Neutrale Entscheidungsprinzipien</span>

<span class="hljs-statement-title">[Normative Grundlage: Prinzip der Chancenergreifung]:</span> Wenn von einer Maßnahme M zu erwarten ist, dass sie sowohl erstrebenswerten Konsequenzen EK als auch zu Nachteilen N führen wird, der erwartete Nutzen bzw. Schaden aus EK oder N aber nicht bestimmbar ist, dann soll M ergriffen werden, wenn gilt: (i) der potentielle Gewinn an gesamtgesellschaftlichem Nutzen aus der Realisierung der Handlungsoption ist insgesamt höher ist als der mögliche Verlust an gesamtgesellschaftlichem Nutzen aus der Realisierung und (ii) die möglichen Verluste aus der Realisierung der Handlungsoption können so aufgeteilt werden, dass niemand von den Betroffenen moralisch signifikant benachteiligt wird und (iii) es gibt keinen anderen Weg als M, die maximal möglichen Vorteile EK mit geringeren Nachteilen als N zu realisieren.

<span class="hljs-statement-title">[Vorsorgeprinzip]:</span> Wenn von einer Maßnahme M zu erwarten ist, dass sie sowohl erstrebenswerten Konsequenzen EK als auch zu Nachteilen N führen wird, der erwartete Nutzen bzw. Schaden aus EK oder N aber nicht bestimmbar ist, dann soll die Maßnahme unterlassen werden, wenn gilt: (i) der schlimmst mögliche Schaden kann deutlich höher werden als der bestmögliche Nutzen und (ii) der schlimmst mögliche Schaden kann derart gravierend werden, dass er nicht ohne moralisch signifikante Benachteiligungen aufgefangen werden kann.


<span class="hljs-section">## Pro-Argumentation unter hoher Ungewissheit</span>

<span class="hljs-comment">&lt;!--
&lt;A1.3: Finanzielle Zuschüsse wichtiger als Olympia-Risiken&gt;#pro {isInMap:false} 

(1) Wenn die Stadt München ihre Infrastrukturprojekte umsetzt und nicht die Olympischen Spiele ausrichtet, wird das Stadthaushalt höher belastet und es gibt keine Risiken aus der Kooperation mit dem IOC.
 &lt;+ &lt;A1.3.1: Ohne Olympia-Ausrichtung keine Zuschüsse&gt;
(2) [Zuschüsse für Infrastruktur wichtiger als Olympia-Risiken]: Die zusätzliche Belastung des Stadthaushalts (durch den Wegfall der Zuschüsse) hat insgesamt höhere Nachteile als das Tragen der Risiken aus der Kooperation mit dem IOC.#wid {isInMap:false}
 &gt;&lt; [Risiken der IOC-Kooperation schlimmer als Verzicht auf finanzielle Zuschüsse]
----
(3) Wenn die Stadt München ihre Infrastrukturprojekte umsetzt und nicht die Olympischen Spiele ausrichtet, hat sie größere Nachteile als wenn sie die Olympischen Spiele ausrichtet und dabei die Infrastrukturprojekte umsetzt.
(4) Entweder wird die Stadt München ihre Infrastrukturprojekte realisieren und Olympische Spiele ausrichten oder sie wird sie realisieren und keine Olympischen Spiele ausrichten.
----
(5) [Optimalität der Olympia-Bewerbung]: Es ist nicht möglich, die Vorteile der Ausrichtung der Olympischen Spiele zu realisieren (Infrastrukturprojekte) und geringere Nachteile als denen, die durch eine erfolgreiche Olympia-Bewerbung entstehen können (Risiken aus der Kooperation mit dem IOC), in Kauf zu nehmen.
 &gt;&lt; [Bessere Alternative]
--&gt;</span>

<span class="hljs-argument-title">&lt;A2: Argument der Chancen-Ergreifung&gt;</span><span class="hljs-tag">#pro</span>

<span class="hljs-argument-statement-nr">(1)</span> <span class="hljs-statement-title">[Alle unkontroversen Pro-Gesichtspunkte]</span>
<span class="hljs-argument-statement-nr">(2)</span> <span class="hljs-statement-title">[Alle unkontroversen Contra-Gesichtspunkte]</span>
<span class="hljs-argument-statement-nr">(3)</span> <span class="hljs-statement-title">[Normative Grundlage: Prinzip der Chancenergreifung]:</span> Wenn von einer Maßnahme M zu erwarten ist, dass sie sowohl erstrebenswerten Konsequenzen EK als auch zu Nachteilen N führen wird, der erwartete Nutzen bzw. Schaden aus EK oder N aber nicht bestimmbar ist, dann soll M ergriffen werden, wenn gilt: (i) der potentielle Gewinn an gesamtgesellschaftlichem Nutzen aus der Realisierung der Handlungsoption ist insgesamt höher ist als der mögliche Verlust an gesamtgesellschaftlichem Nutzen aus der Realisierung und (ii) die möglichen Verluste aus der Realisierung der Handlungsoption können so aufgeteilt werden, dass niemand von den Betroffenen moralisch signifikant benachteiligt wird und (iii) es gibt keinen anderen Weg als M, die maximal möglichen Vorteile EK mit geringeren Nachteilen als N zu realisieren.
<span class="hljs-argument-statement-nr">(4)</span> <span class="hljs-statement-title">[Mögliche Gewinne höher als mögliche Verluste]:</span> Maximal mögliche Gewinne an gesamtgesellschaftlichem Nutzen aus der Ausrichtung der Olympischen Spiele in München -- Infrastrukturausbau, Sporterlebnisse, finanzielle Gewinne -- sind höher als die maximal möglichen Verluste an gesamtgesellschaftlichen Nutzen (Kosten und Finanzrisiken, Risiken aus der Kooperation mit dem IOC).<span class="hljs-tag">#(wid)</span>
<span class="hljs-contradiction">  &gt;&lt;</span> <span class="hljs-statement-title">[Maximale Verluste deutlich höher als potentielle  Gewinne]</span>
<span class="hljs-argument-statement-nr">(5)</span> <span class="hljs-statement-title">[Mögliche Verluste sind tragbar]:</span> Die möglichen Verluste an gesamtgesellschaftlichem Nutzen aus der Ausrichtung der Olympischen Spiele (unerwartete finanzielle Belastungen) können, sollten sie auftreten, so aufgeteilt werden, dass dadurch niemand moralisch signifikant benachteiligt wird. <span class="hljs-tag">#(pro)</span>
<span class="hljs-contradiction">  &gt;&lt;</span> <span class="hljs-statement-title">[Maximale Verluste gravierend]</span>
<span class="hljs-argument-statement-nr">(6)</span> Der erwartete Nutzen der Ausrichtung der Olympischen Spiele (und der Nutzen ihrer Unterlassung) ist nicht bestimmbar.
<span class="hljs-argument-statement-nr">(7)</span>  <span class="hljs-statement-title">[Optimalität der Olympia-Bewerbung]:</span> Es gibt keinen anderen Weg, mit geringeren Nachteilen als denen, die durch eine erfolgreiche Olympia-Bewerbung entstehen können, die positiven Konsequenzen für die Stadt zu realisieren, die von der Ausrichtung der Olympischen Spiele zu erwarten sind.<span class="hljs-tag">#(pro)</span>
<span class="hljs-contradiction">  &gt;&lt;</span> <span class="hljs-statement-title">[Bessere Alternative]</span>
<span class="hljs-inference">----</span>
<span class="hljs-argument-statement-nr">(5)</span> <span class="hljs-statement-title">[Pro-Olympia-Bewerbung]</span>


<span class="hljs-section">## Kontra-Argumentation unter Ungewissheit</span>

<span class="hljs-argument-title">&lt;A6 Risiken-Minimierung&gt;:</span> die schlimmst möglichen Nachteile aus einer Kooperation mit dem IOC sind derart gravierend, dass es insgesamt besser ist, sie gar nicht zuzulassen.<span class="hljs-tag">#(contra)</span>

<span class="hljs-argument-statement-nr">(1)</span> <span class="hljs-statement-title">[Alle unkontroversen Pro-Gesichtspunkte]</span>
<span class="hljs-argument-statement-nr">(2)</span> <span class="hljs-statement-title">[Alle unkontroversen Contra-Gesichtspunkte]</span>
<span class="hljs-argument-statement-nr">(3)</span> <span class="hljs-statement-title">[Vorsorgeprinzip]:</span> Wenn von einer Maßnahme M zu erwarten ist, dass sie sowohl erstrebenswerten Konsequenzen EK als auch zu Nachteilen N führen wird, der erwartete Nutzen bzw. Schaden aus EK oder N aber nicht bestimmbar ist, dann soll die Maßnahme unterlassen werden, wenn gilt: (i) der schlimmst mögliche Schaden kann deutlich höher werden als der bestmögliche Nutzen und (ii) der schlimmst mögliche Schaden kann derart gravierend werden, dass er nicht ohne moralisch signifikante Benachteiligungen aufgefangen werden kann.
<span class="hljs-argument-statement-nr">(4)</span> Der erwartete Nutzen der Ausrichtung der Olympischen Spiele (und der Nutzen ihrer Unterlassung) ist nicht bestimmbar.
<span class="hljs-argument-statement-nr">(5)</span> <span class="hljs-statement-title">[Maximale Verluste deutlich höher als potentielle  Gewinne]:</span> Die maximal möglichen Verluste an gesamtgesellschaftlichem Nutzen aus der Ausrichtung der Olympischen Spiele -- ökologische Schäden sowie unerwartete finanzielle Belastungen -- können deutlich höher ausfallen als die maximal möglichen Gewinne -- Infrastrukturausbau, Sporterlebnisse, finanzielle Gewinne.<span class="hljs-tag">#(wid)</span>
<span class="hljs-argument-statement-nr">(6)</span> <span class="hljs-statement-title">[maximale Verluste gravierend]:</span> Die maximal möglichen Verluste aus der Ausrichtung der Olympischen Spiele können derart gravierend werden, dass ihr Auffangen zu moralisch signifikanten Benachteiligungen führen wird.<span class="hljs-tag">#(contra)</span> 
<span class="hljs-inference">----</span>
<span class="hljs-argument-statement-nr">(7)</span> <span class="hljs-statement-title">[Gegen-Olympia-Bewerbung]</span>

<span class="hljs-argument-title">&lt;A5: Bessere Alternative&gt;:</span> Es ist besser, die Stadtinfrastruktur unabhängig von der Ausrichtung Olympischer Spiele auszubauen.<span class="hljs-tag">#contra</span> <span class="hljs-meta">{isInMap: true}</span>

<span class="hljs-argument-statement-nr">(1)</span> <span class="hljs-statement-title">[Alle unkontroversen Pro-Gesichtspunkte]</span>
<span class="hljs-argument-statement-nr">(2)</span> <span class="hljs-statement-title">[Alle unkontroversen Contra-Gesichtspunkte]</span>
<span class="hljs-argument-statement-nr">(3)</span> <span class="hljs-statement-title">[Abwägungsprinzip]:</span> Wenn von einer Maßnahme M zu erwarten ist, dass sie sowohl erstrebenswerten Konsequenzen EK als auch zu Nachteilen N führen wird, soll die Maßnahme M genau dann durchgeführt werden, wenn gilt: (i) das Herbeiführen der erwünschten Konsequenzen EK ist insgesamt besser als das Vermeiden der erwarteten Nachteile N und (ii) es gibt keinen anderen Weg als M, die Vorteile EK mit geringeren Nachteilen als N zu realisieren. <span class="hljs-meta">{isInMap: false}</span>
<span class="hljs-argument-statement-nr">(4)</span> <span class="hljs-statement-title">[Bessere Alternative]:</span> Wenn die Stadt München die Infrastrukturvorhaben, die sie im Zuge der Olympia-Ausrichtung realisieren will, vollständig selbst finanziert, hat sie insgesamt geringere Nachteile zu tragen als durch ihre Realisierung mittels Olympia-Ausrichtung, auch wenn dadurch auf einmalige Erlebnisse verzichtet wird.<span class="hljs-tag">#(contra)</span>
<span class="hljs-inference">----</span>

<text text-anchor="start" x="271.82" y="-218" font-family="arial" font-weight="bold" font-size="10.00" fill="#000000">Alle unkontroversen</text>

<text text-anchor="start" x="1601.94" y="-302" font-family="arial" font-weight="bold" font-size="10.00" fill="#000000">Normative Grundlage: Prinzip</text>
<text text-anchor="start" x="1614.99" y="-292" font-family="arial" font-weight="bold" font-size="10.00" fill="#000000"> der Chancenergreifung</text>
<text text-anchor="start" x="1572.76" y="-277" font-family="arial" font-size="10.00" fill="#000000">Wenn von einer Maßnahme M zu erwarten</text>
<text text-anchor="start" x="1583.04" y="-265" font-family="arial" font-size="10.00" fill="#000000"> ist, dass sie sowohl erstrebenswerten</text>
<text text-anchor="start" x="1573.02" y="-253" font-family="arial" font-size="10.00" fill="#000000"> Konsequenzen EK als auch zu Nachteilen</text>
<text text-anchor="start" x="1583.05" y="-241" font-family="arial" font-size="10.00" fill="#000000"> N führen wird, der erwartete Nutzen</text>
<text text-anchor="start" x="1577.47" y="-229" font-family="arial" font-size="10.00" fill="#000000"> bzw. Schaden aus EK oder N aber nicht</text>
<text text-anchor="start" x="1585.55" y="-217" font-family="arial" font-size="10.00" fill="#000000"> bestimmbar ist, dann soll M ergriffen</text>
<text text-anchor="start" x="1587.21" y="-205" font-family="arial" font-size="10.00" fill="#000000"> werden, wenn gilt: (i) der potentielle</text>
<text text-anchor="start" x="1583.6" y="-193" font-family="arial" font-size="10.00" fill="#000000"> Gewinn an gesamtgesellschaftlichem</text>
<text text-anchor="start" x="1594.43" y="-181" font-family="arial" font-size="10.00" fill="#000000"> Nutzen aus der Realisierung der</text>
<text text-anchor="start" x="1582.3" y="-169" font-family="arial" font-size="10.00" fill="#000000"> Handlungsoption ist insgesamt höher</text>
<text text-anchor="start" x="1597.86" y="-157" font-family="arial" font-size="10.00" fill="#000000"> ist als der mögliche Verlust an</text>
<text text-anchor="start" x="1582.2" y="-145" font-family="arial" font-size="10.00" fill="#000000"> gesamtgesellschaftlichem Nutzen aus</text>
<text text-anchor="start" x="1604.99" y="-133" font-family="arial" font-size="10.00" fill="#000000"> der Realisierung und (ii) die</text>
<text text-anchor="start" x="1603.97" y="-121" font-family="arial" font-size="10.00" fill="#000000"> möglichen Verluste aus der</text>
<text text-anchor="start" x="1590.82" y="-109" font-family="arial" font-size="10.00" fill="#000000"> Realisierung der Handlungsoption</text>
<text text-anchor="start" x="1588.68" y="-97" font-family="arial" font-size="10.00" fill="#000000"> können so aufgeteilt werden, dass</text>
<text text-anchor="start" x="1577.75" y="-85" font-family="arial" font-size="10.00" fill="#000000"> niemand von den Betroffenen moralisch</text>
<text text-anchor="start" x="1594.15" y="-73" font-family="arial" font-size="10.00" fill="#000000"> signifikant benachteiligt wird und</text>
<text text-anchor="start" x="1588.04" y="-61" font-family="arial" font-size="10.00" fill="#000000"> (iii) es gibt keinen anderen Weg als</text>
<text text-anchor="start" x="1580.37" y="-49" font-family="arial" font-size="10.00" fill="#000000"> M, die maximal möglichen Vorteile EK</text>
<text text-anchor="start" x="1589.71" y="-37" font-family="arial" font-size="10.00" fill="#000000"> mit geringeren Nachteilen als N zu</text>
<text text-anchor="start" x="1641.67" y="-25" font-family="arial" font-size="10.00" fill="#000000"> realisieren.</text>
</g>

<text text-anchor="start" x="1859.5" y="-256" font-family="arial" font-weight="bold" font-size="10.00" fill="#000000">Vorsorgeprinzip</text>
<text text-anchor="start" x="1799.76" y="-239" font-family="arial" font-size="10.00" fill="#000000">Wenn von einer Maßnahme M zu erwarten</text>
<text text-anchor="start" x="1810.04" y="-227" font-family="arial" font-size="10.00" fill="#000000"> ist, dass sie sowohl erstrebenswerten</text>
<text text-anchor="start" x="1800.02" y="-215" font-family="arial" font-size="10.00" fill="#000000"> Konsequenzen EK als auch zu Nachteilen</text>
<text text-anchor="start" x="1810.05" y="-203" font-family="arial" font-size="10.00" fill="#000000"> N führen wird, der erwartete Nutzen</text>
<text text-anchor="start" x="1804.47" y="-191" font-family="arial" font-size="10.00" fill="#000000"> bzw. Schaden aus EK oder N aber nicht</text>
<text text-anchor="start" x="1803.1" y="-179" font-family="arial" font-size="10.00" fill="#000000"> bestimmbar ist, dann soll die Maßnahme</text>
<text text-anchor="start" x="1811.15" y="-167" font-family="arial" font-size="10.00" fill="#000000"> unterlassen werden, wenn gilt: (i) der</text>
<text text-anchor="start" x="1814.58" y="-155" font-family="arial" font-size="10.00" fill="#000000"> schlimmst mögliche Schaden kann</text>
<text text-anchor="start" x="1825.97" y="-143" font-family="arial" font-size="10.00" fill="#000000"> deutlich höher werden als der</text>
<text text-anchor="start" x="1819.59" y="-131" font-family="arial" font-size="10.00" fill="#000000"> bestmögliche Nutzen und (ii) der</text>
<text text-anchor="start" x="1800.14" y="-119" font-family="arial" font-size="10.00" fill="#000000"> schlimmst mögliche Schaden kann derart</text>
<text text-anchor="start" x="1808.09" y="-107" font-family="arial" font-size="10.00" fill="#000000"> gravierend werden, dass er nicht ohne</text>
<text text-anchor="start" x="1845.33" y="-95" font-family="arial" font-size="10.00" fill="#000000"> moralisch signifikante</text>
<text text-anchor="start" x="1805.02" y="-83" font-family="arial" font-size="10.00" fill="#000000"> Benachteiligungen aufgefangen werden</text>
<text text-anchor="start" x="1880.88" y="-71" font-family="arial" font-size="10.00" fill="#000000"> kann.</text>
</g>
<!-- n5&#45;&gt;n14 -->
