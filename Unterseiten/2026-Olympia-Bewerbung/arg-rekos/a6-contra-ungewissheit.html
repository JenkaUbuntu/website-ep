<span class="hljs-statement-title">[Gegen-Olympia-Bewerbung]:</span> Die Stadt München sollte sich nicht um die Ausrichtung der Olympischen Spiele 2036/40/44 bewerben. <span class="hljs-tag">#(contra)</span>

<span class="hljs-section">## Unstrittige Pro-Gesichtspunkte</span>

<span class="hljs-statement-title">[Die Ausrichtung Olympischer Spiele führt zu unverhältnismäßig hohen ökologischen Belastungen]</span><span class="hljs-tag">#contra</span>
<span class="hljs-support">  +&gt;</span> <span class="hljs-statement-title">[Alle unkontroversen Contra-Gesichtspunkte]</span>


<span class="hljs-section">## Argumentation unter Ungewissheit</span>

<span class="hljs-argument-title">&lt;A6 Risiken-Minimierung&gt;:</span> die schlimmst möglichen Nachteile aus einer Kooperation mit dem IOC sind derart gravierend, dass es insgesamt besser ist, sie gar nicht zuzulassen.<span class="hljs-tag">#(contra)</span>

<span class="hljs-argument-statement-nr">(1)</span> <span class="hljs-statement-title">[Alle unkontroversen Pro-Gesichtspunkte]</span>
<span class="hljs-argument-statement-nr">(2)</span> <span class="hljs-statement-title">[Alle unkontroversen Contra-Gesichtspunkte]</span>
<span class="hljs-argument-statement-nr">(3)</span> <span class="hljs-statement-title">[Normative Grundlage: Vorsorgeprinzip]:</span> Wenn von einer Maßnahme M zu erwarten ist, dass sie sowohl erstrebenswerten Konsequenzen EK als auch zu Nachteilen N führen wird, der erwartete Nutzen bzw. Schaden aus EK oder N aber nicht bestimmbar ist, dann soll die Maßnahme unterlassen werden, wenn gilt: (i) der schlimmst mögliche Schaden kann deutlich höher werden als der bestmögliche Nutzen und (ii) der schlimmst mögliche Schaden kann derart gravierend werden, dass er nicht ohne moralisch signifikante Benachteiligungen aufgefangen werden kann.
<span class="hljs-argument-statement-nr">(4)</span> Der erwartete Nutzen der Ausrichtung der Olympischen Spiele (und der Nutzen ihrer Unterlassung) ist nicht bestimmbar.
<span class="hljs-argument-statement-nr">(5)</span> Die maximal möglichen Verluste an gesamtgesellschaftlichem Nutzen aus der Ausrichtung der Olympischen Spiele -- ökologische Schäden sowie unerwartete finanzielle Belastungen -- können deutlich höher ausfallen als die maximal möglichen Gewinne -- Infrastrukturausbau, Sporterlebnisse, finanzielle Gewinne.
<span class="hljs-argument-statement-nr">(6)</span> Die maximal möglichen Verluste aus der Ausrichtung der Olympischen Spiele können derart gravierend werden, dass ihr Auffangen zu moralisch signifikanten Benachteiligungen führen wird. 
<span class="hljs-inference">----</span>
<span class="hljs-argument-statement-nr">(7)</span> <span class="hljs-statement-title">[Gegen-Olympia-Bewerbung]</span>

<span class="hljs-argument-title">&lt;A6.1.1. Das IOC ist ein unfairer Kooperationspartner&gt;:</span> Das IOC priorisiert das Ziel möglichst hoher Einnahmen durch die Olympischen Spiele.<span class="hljs-tag">#(contra)</span>

<span class="hljs-argument-statement-nr">(1)</span> Beim IOC spielt das Interesse, mit den Olympischen Spielen, möglichst hohe Einnahmen zu generieren, eine prioritäre Rolle.
<span class="hljs-argument-statement-nr">(2)</span> Wenn ein Ausrichter einer Veranstaltung das Ziel Z priorisiert, dann ist damit zu rechnen, dass der Ausrichter bei Zielkonflikten häufig für die Realisierung von Z entscheiden wird. 
<span class="hljs-argument-statement-nr">(3)</span> Bei der Festlegung des Konzepts der Olympischen Spiele zwischen der Stadt München und dem IOC ist mit zahlreichen Konflikten zwischen dem Finanzinteresse des IOC und den Zielen der Stadt München (Nachhaltigkeit, Kostenreduktion) zu rechnen. 
<span class="hljs-inference">----</span>
<span class="hljs-argument-statement-nr">(4)</span> <span class="hljs-statement-title">[Risiko aus der Gewinnorientierung des IOC]:</span> Bei der Festlegung des Konzepts der Olympischen Spiele ist damit zu rechnen, dass das IOC auf zahlreichen Lösungen besteht, die die IOC-Einnahmen maximieren und die Spiele für die Stadt München teurer  und weniger nachhaltig machen. <span class="hljs-tag">#(contra)</span>

<span class="hljs-argument-title">&lt;A6.1: Finanzielle Risiken für die Stadt München aus einer Kooperation mit dem IOC&gt;</span><span class="hljs-tag">#contra</span>

<span class="hljs-argument-statement-nr">(4)</span> <span class="hljs-statement-title">[Risiko aus der Gewinnorientierung des IOC]:</span> Bei der Festlegung des Konzepts der Olympischen Spiele ist damit zu rechnen, dass das IOC auf zahlreichen Lösungen besteht, die die IOC-Einnahmen maximieren und die Spiele für die Stadt München teurer  und weniger nachhaltig machen. 
<span class="hljs-argument-statement-nr">(5)</span> Wenn da IOC auf zahlreichen Lösungen besteht, die die Spiele die Spiele für die Stadt München teurer  und weniger nachhaltig machen, können die Verluste aus der Ausrichtung der Spiele die Gewinne deutlich übertreffen.
<span class="hljs-inference">----</span>
<span class="hljs-argument-statement-nr">(6)</span> Die maximal möglichen Verluste an gesamtgesellschaftlichem Nutzen aus der Ausrichtung der Olympischen Spiele -- ökologische Schäden sowie unerwartete finanzielle Belastungen -- können deutlich höher ausfallen als die maximal möglichen Gewinne -- Infrastrukturausbau, Sporterlebnisse, finanzielle Gewinne.
<span class="hljs-support"> +&gt;</span> <span class="hljs-argument-title">&lt;A6 Risiken-Minimierung&gt;</span>

<span class="hljs-comment">&lt;!--
## Kontra-Gesichtspunkte


[Olympische Spiele kosten unverhältnismäßig viel]#(contra)
 &lt;+ [Zusätzliche Kosten für den Stadthaushalt]: Der Ausbau von Sportstätten auf Olympia-Niveau wird den Stadthaushalt stark belasten und wichtigere Projekte aufschieben.#(contra) 
 &lt;+ [Finanzrisiken]: Es besteht die Gefahr, dass die tatsächlichen Kosten für die Durchführung der Olympischen Spiele höher ausfallen werden als geschätzt und dass sie von der Stadt München getragen werden müssen. #(contra)
 +&gt; [Gegen-Olympia-Bewerbung]


[Das IOC ist ein unfairer Partner, mit dem nicht kooperiert werden sollte]#(contra)
 &lt;+ [Gefahr einer Abhängigkeit vom IOC]: Städte, die Olympische Spiele ausrichten, müssen Verträge unterzeichnen, die dem IOC umfassende Rechte einräumen -- etwa bei der Nutzung öffentlicher Flächen, der Werbung oder der Sicherheit. Diese Verträge können die Stadt daran hindern, die Spiele so auszurichten, wie sie sie ursprünglich geplant haben. #contra
 &lt;+ [Unfaire Verteilung der Gewinne]: Gewinner sind vor allem die IOC-Sponsoren, nicht die lokale Wirtschaft. #(contra)
 +&gt; [Gegen-Olympia-Bewerbung]

 [Ökologische Belastungen durch Olympische Spiele]#contra
  &lt;+ [Ressourcenverschwendung durch temporäre Sportanlagen]: Ausrichtung der Spiele würde erfordern, dass temporäre Sportstätten gebaut werden.#(contra)
  &lt;+ [Eingriffe in schützenswerte Natur]: In Daglfing soll für das Olympische Dorf Ackerboden versiegelt werden. Dort wachsen heute regionale Lebensmittel, dort leben bedrohte Tierarten. Diese ökologisch sensiblen Flächen für ein zweiwöchiges Event zu opfern, ist unverantwortlich.#(contra)
  +&gt; [Gegen-Olympia-Bewerbung]
  &lt;- [Nachhaltige Olympische Spiele]

<text text-anchor="start" x="803.6" y="-536.01" font-family="arial" font-weight="bold" font-size="10.00" fill="#000000">Normative Grundlage:</text>
<text text-anchor="start" x="816.11" y="-526.01" font-family="arial" font-weight="bold" font-size="10.00" fill="#000000"> Vorsorgeprinzip</text>
<text text-anchor="start" x="757.76" y="-511.01" font-family="arial" font-size="10.00" fill="#000000">Wenn von einer Maßnahme M zu erwarten</text>
<text text-anchor="start" x="768.04" y="-499.01" font-family="arial" font-size="10.00" fill="#000000"> ist, dass sie sowohl erstrebenswerten</text>
<text text-anchor="start" x="758.02" y="-487.01" font-family="arial" font-size="10.00" fill="#000000"> Konsequenzen EK als auch zu Nachteilen</text>
<text text-anchor="start" x="768.05" y="-475.01" font-family="arial" font-size="10.00" fill="#000000"> N führen wird, der erwartete Nutzen</text>
<text text-anchor="start" x="762.47" y="-463.01" font-family="arial" font-size="10.00" fill="#000000"> bzw. Schaden aus EK oder N aber nicht</text>
<text text-anchor="start" x="761.1" y="-451.01" font-family="arial" font-size="10.00" fill="#000000"> bestimmbar ist, dann soll die Maßnahme</text>
<text text-anchor="start" x="769.15" y="-439.01" font-family="arial" font-size="10.00" fill="#000000"> unterlassen werden, wenn gilt: (i) der</text>
<text text-anchor="start" x="772.58" y="-427.01" font-family="arial" font-size="10.00" fill="#000000"> schlimmst mögliche Schaden kann</text>
<text text-anchor="start" x="783.97" y="-415.01" font-family="arial" font-size="10.00" fill="#000000"> deutlich höher werden als der</text>
<text text-anchor="start" x="777.59" y="-403.01" font-family="arial" font-size="10.00" fill="#000000"> bestmögliche Nutzen und (ii) der</text>
<text text-anchor="start" x="758.14" y="-391.01" font-family="arial" font-size="10.00" fill="#000000"> schlimmst mögliche Schaden kann derart</text>
<text text-anchor="start" x="766.09" y="-379.01" font-family="arial" font-size="10.00" fill="#000000"> gravierend werden, dass er nicht ohne</text>
<text text-anchor="start" x="803.33" y="-367.01" font-family="arial" font-size="10.00" fill="#000000"> moralisch signifikante</text>
<text text-anchor="start" x="763.02" y="-355.01" font-family="arial" font-size="10.00" fill="#000000"> Benachteiligungen aufgefangen werden</text>
<text text-anchor="start" x="838.88" y="-343.01" font-family="arial" font-size="10.00" fill="#000000"> kann.</text>
</g>
