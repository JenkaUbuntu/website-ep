<span class="hljs-section"># Vorgebrachte Gründe gegen eine Bewerbung Münchens um Olympia-Austragung</span>

<span class="hljs-section">## Kosten und Finanzrisiken</span>

<span class="hljs-statement-title">[Hohe Kosten für temporäre Olympia-Infrastruktur]:</span> Obwohl München über viele Sportstätten verfügt, werden für die Olympia-Ausrichtung bestehende Sportstätten auf Olympia-Niveau ausgebaut werden müssen. Trotz der finanziellen Zuschüsse wird dieser Ausbau den Stadthaushalt stark belasten und wichtigere Projekte aufschieben. <span class="hljs-tag">#(contra)</span>

<span class="hljs-statement-title">[Finanzrisiken]:</span> Es besteht die Gefahr, dass die tatsächlichen Kosten für die Durchführung der Olympischen Spiele höher ausfallen werden als geschätzt und dass sie von der Stadt München getragen werden müssen. <span class="hljs-tag">#contra</span>

<span class="hljs-section">## Langfristige negative Auswirkungen</span>

<span class="hljs-statement-title">[Eingriffe in die schützenswerte Natur und Umwelt]:</span> Für die Spiele könnten wertvolle Naturflächen zerstört oder beeinträchtigt werden, beispielsweise Versiegelung des Ackerbodens in Daglfing für das Olympische Dorf. <span class="hljs-tag">#contra</span>

<span class="hljs-statement-title">[Negative soziale Folgen]:</span> Gentrifizierung, Gefahr, dass die geplanten Wohnungen teuer vermietet werden. <span class="hljs-tag">#contra</span>

<span class="hljs-section">## Das IOC kein fairer Partner</span>

<span class="hljs-statement-title">[Risiko eienr &quot;Geiselnahme&quot; durch das IOC]:</span> Städte, die Olympische Spiele ausrichten, müssen Verträge unterzeichnen, die dem IOC umfassende Rechte einräumen -- etwa bei der Nutzung öffentlicher Flächen, der Werbung oder der Sicherheit. Diese Verträge können die Stadt daran hindern, die Spiele so auszurichten, wie sie sie ursprünglich geplant haben. <span class="hljs-tag">#contra</span>
