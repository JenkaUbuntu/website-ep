<span class="hljs-statement-title">[Pro-Olympia-Bewerbung]:</span> Die Stadt München sollte sich um die Ausrichtung der Olympischen Spiele 2036/40/44 bewerben. <span class="hljs-tag">#(pro)</span>

<span class="hljs-statement-title">[Gegen-Olympia-Bewerbung]:</span> Die Stadt München sollte sich nicht um die Ausrichtung der Olympischen Spiele 2036/40/44 bewerben. <span class="hljs-tag">#(contra)</span>

<span class="hljs-statement-title">[Alle unkontroversen Pro-Gesichtspunkte]:</span> Von der Ausrichtung der Olympischen Spiele in München sind folgende Vorteile zu erwarten: Förderung der Stadtentwicklung, Verbesserung der Inklusion durch Ausbau der Barrierefreiheit, Gewinne für die lokale Wirtschaft sowie einzigartige Erlebnisse für die Stadtbewohner<span class="hljs-meta">\*</span>innen. <span class="hljs-tag">#pro</span>

<span class="hljs-statement-title">[Alle unkontroversen Contra-Gesichtspunkte]:</span> Von der Ausrichtung der Olympischen Spiele in München sind folgende Nachteile zu erwarten: ihre Ausrichtung belastet den Stadthaushalt, sie birgt hohe finanzielle Risiken, zusätzliche ökologische Belastungen und die Ausrichtung erfordert Kooperation mit einem unfairen Partner, dem IOC.<span class="hljs-tag">#contra</span>

<span class="hljs-section"># Pro-Argumente</span>

<span class="hljs-section">## Abwägungs-Argumentation</span>

<span class="hljs-argument-title">&lt;A1: Pro-Abwägung-1&gt;:</span> Vorteile aus der Ausrichtung von Olympischen Spielen überwiegen die Nachteile daraus.<span class="hljs-tag">#(pro)</span>

<span class="hljs-argument-statement-nr">(1)</span> <span class="hljs-statement-title">[Alle unkontroversen Pro-Gesichtspunkte]</span><span class="hljs-tag">#pro</span>
<span class="hljs-argument-statement-nr">(2)</span> <span class="hljs-statement-title">[Alle unkontroversen Contra-Gesichtspunkte]</span>
<span class="hljs-argument-statement-nr">(3)</span> Wenn von einer Maßnahme M zu erwarten ist, dass sie sowohl erstrebenswerten Konsequenzen EK als auch zu Nachteilen N führen wird, soll die Maßnahme M genau dann durchgeführt werden, wenn gilt: (i)
das Herbeiführen der erwünschten Konsequenzen EK ist insgesamt besser als das Vermeiden der erwarteten Nachteile N und (ii) 
es gibt keinen anderen Weg als M, die Vorteile EK mit geringeren Nachteilen als N zu realisieren.
<span class="hljs-argument-statement-nr">(4)</span> Trotz der benötigten Investitionen für die Ausrichtung der Olympischen Spiele, der damit verbundenen Finanzrisiken und der Risiken der Einflussnahme durch das IOC ist es insgesamt besser, die einzigartigen Erlebnisse, die mittel- bis langfristigen Vorteile aus dem Ausbau der städtischen Infrastruktur einschließlich der Barrierefreiheit sowie die zusätzlichen Gewinne für die lokale Wirtschaft zu realisieren.<span class="hljs-tag">#(pro)</span>
  <span class="hljs-comment">&lt;!--
  &lt;+ &lt;Nachteile-Debunking-Argument&gt;: Nachteile aus der Ausrichtung Olympischer Spiele sind vernachlässigbar #(pro)
  &lt;+ &lt;A1.1: Erwartungswert-Argument&gt;: Aggregation der Vorteile ist höher als das Aggregat der Nachteile.#(pro)--&gt;</span>
<span class="hljs-argument-statement-nr">(5)</span> Es gibt keinen anderen Weg, mit geringeren Nachteilen als denen, die durch eine erfolgreiche Olympia-Bewerbung entstehen können, die positiven Konsequenzen für die Stadt zu realisieren, die von der Ausrichtung der Olympischen Spiele zu erwarten sind.<span class="hljs-tag">#(pro)</span>
<span class="hljs-comment">&lt;!--
 &lt;+ &lt;A1.2: Finanzielle Zuschüsse vom Land und Bund&gt;#pro--&gt;</span>
<span class="hljs-inference">----</span>
<span class="hljs-argument-statement-nr">(6)</span> <span class="hljs-statement-title">[Pro-Olympia-Bewerbung]</span>

<span class="hljs-comment">&lt;!--
&lt;A1.1: Erwartungswert-Argument&gt;

(1) Das Herbeiführen der möglichen Vorteile einer Handlungsoption ist dann besser als das Vermeiden ihrer möglichen Nachteile,  wenn der erwartete gesamtgesellschaftliche Nutzen der möglichen Vorteile höher ist als der erwartete gesamtgesellschaftliche Schaden aus den möglichen Nachteilen. 
(2) Der erwartete gesamtgesellschaftliche Nutzen aus den möglichen Vorteilen der Ausrichtung Olympischer Spiele -- Infrastrukturausbau, einzigartige Erlebnisse, finanzielle Gewinne für die lokale Wirtschaft -- ist höher als der erwartete gesamtgesellschaftliche Schaden aus den möglichen Nachteilen der Ausrichtung (Kosten- und Finanzrisiken, Kooperation mit einem unfairen Partner). 
----
(3) Trotz der benötigten Investitionen für die Ausrichtung der Olympischen Spiele, der damit verbundenen Finanzrisiken und der Risiken der Einflussnahme durch das IOC ist es insgesamt besser, die einzigartigen Erlebnisse, die mittel- bis langfristigen Vorteile aus dem Ausbau der städtischen Infrastruktur einschließlich der Barrierefreiheit sowie die zusätzlichen Gewinne für die lokale Wirtschaft zu realisieren.


&lt;A1.2: Finanzielle Zuschüsse vom Land und Bund&gt;#pro

(1) Genau dann, wenn die Stadt München den Zuschlag für die Ausrichtung der Olympischen Spiele bekommt, erhält sie finanzielle Zuschüsse vom Bund und Land für die Realisierung ihrer Infrastrukturprojekte.
----
(2) Wenn die Stadt München ihre Infrastrukturprojekte umsetzt und nicht die Olympischen Spiele ausrichtet, erhält sie keine finanziellen Zuschüsse vom Land und Bund.
(3) Realisierung von Infrastrukturprojekten der Stadt München ohne die Zuschüsse vom Land und Bund führt zu höherer Belastung von Stadthaushalt.
(4) Wenn die Stadt München ihre Infrastrukturprojekte umsetzt und nicht die Olympischen Spiele ausrichtet, geht sie keine Risiken aus der Kooperation mit dem IOC.
----
(5) Wenn die Stadt München ihre Infrastrukturprojekte umsetzt und nicht die Olympischen Spiele ausrichtet, wird das Stadthaushalt höher belastet und es gibt keine Risiken aus der Kooperation mit dem IOC.
(6) Die zusätzliche Belastung des Stadthaushalts (durch den Wegfall der Zuschüsse) hat insgesamt höhere Nachteile als das Tragen der Risiken aus der Kooperation mit dem IOC.
----
(7) Wenn die Stadt München ihre Infrastrukturprojekte umsetzt und nicht die Olympischen Spiele ausrichtet, hat sie größere Nachteile als wenn sie die Olympischen Spiele ausrichtet und dabei die Infrastrukturprojekte umsetzt.
(8) Entweder wird die Stadt München ihre Infrastrukturprojekte realisieren und Olympische Spiele ausrichten oder sie wird sie realisieren und keine Olympischen Spiele ausrichten.
----
(9) Es ist nicht möglich, die Vorteile der Ausrichtung der Olympischen Spiele zu realisieren (Infrastrukturprojekte) und geringere Nachteile als denen, die durch eine erfolgreiche Olympia-Bewerbung entstehen können (Risiken aus der Kooperation mit dem IOC), in Kauf zu nehmen.
--&gt;</span>

<span class="hljs-section">## Argumentation unter Ungewissheit</span>

<span class="hljs-argument-title">&lt;A2: Argument der Chancen-Ergreifung&gt;</span><span class="hljs-tag">#pro</span>

<span class="hljs-argument-statement-nr">(1)</span> <span class="hljs-statement-title">[Alle unkontroversen Pro-Gesichtspunkte]</span>
<span class="hljs-argument-statement-nr">(2)</span> <span class="hljs-statement-title">[Alle unkontroversen Contra-Gesichtspunkte]</span>
<span class="hljs-argument-statement-nr">(3)</span> Wenn von einer Maßnahme M zu erwarten ist, dass sie sowohl erstrebenswerten Konsequenzen EK als auch zu Nachteilen N führen wird, der erwartete Nutzen bzw. Schaden aus EK oder N aber nicht bestimmbar ist, dann soll M ergriffen werden, wenn gilt: (i) der potentielle Gewinn an gesamtgesellschaftlichem Nutzen aus der Realisierung der Handlungsoption ist insgesamt höher ist als der mögliche Verlust an gesamtgesellschaftlichem Nutzen aus der Realisierung und (ii) die möglichen Verluste aus der Realisierung der Handlungsoption können so aufgeteilt werden, dass niemand von den Betroffenen moralisch signifikant benachteiligt wird und (iii) es gibt keinen anderen Weg als M, die maximal möglichen Vorteile EK mit geringeren Nachteilen als N zu realisieren.
<span class="hljs-argument-statement-nr">(4)</span> Maximal mögliche Gewinne an gesamtgesellschaftlichem Nutzen aus der Ausrichtung der Olympischen Spiele in München -- Infrastrukturausbau, Sporterlebnisse, finanzielle Gewinne -- sind höher als die maximal möglichen Verluste an gesamtgesellschaftlichen Nutzen (Kosten und Finanzrisiken, Risiken aus der Kooperation mit dem IOC).
<span class="hljs-argument-statement-nr">(5)</span> Die möglichen Verluste an gesamtgesellschaftlichem Nutzen aus der Ausrichtung der Olympischen Spiele (unerwartete finanzielle Belastungen) können, sollten sie auftreten, so aufgeteilt werden, dass dadurch niemand moralisch signifikant benachteil igt wird. 
<span class="hljs-argument-statement-nr">(6)</span> Der erwartete Nutzen der Ausrichtung der Olympischen Spiele (und der Nutzen ihrer Unterlassung) ist nicht bestimmbar.
<span class="hljs-argument-statement-nr">(7)</span> Es ist nicht möglich, die Vorteile der Ausrichtung der Olympischen Spiele zu realisieren (Infrastrukturprojekte) und geringere Nachteile als denen, die durch eine erfolgreiche Olympia-Bewerbung entstehen können (Risiken aus der Kooperation mit dem IOC), in Kauf zu nehmen.
<span class="hljs-inference">----</span>
<span class="hljs-argument-statement-nr">(5)</span> <span class="hljs-statement-title">[Pro-Olympia-Bewerbung]</span>

<span class="hljs-section">## Argumentation unter Ungewissheit</span>

<span class="hljs-argument-title">&lt;A6 Risiken-Minimierung&gt;:</span> die schlimmst möglichen Nachteile aus einer Kooperation mit dem IOC sind derart gravierend, dass es insgesamt besser ist, sie gar nicht zuzulassen.<span class="hljs-tag">#(contra)</span>

<span class="hljs-argument-statement-nr">(1)</span> <span class="hljs-statement-title">[Alle unkontroversen Pro-Gesichtspunkte]</span>
<span class="hljs-argument-statement-nr">(2)</span> <span class="hljs-statement-title">[Alle unkontroversen Contra-Gesichtspunkte]</span>
<span class="hljs-argument-statement-nr">(3)</span> Wenn von einer Maßnahme M zu erwarten ist, dass sie sowohl erstrebenswerten Konsequenzen EK als auch zu Nachteilen N führen wird, der erwartete Nutzen bzw. Schaden aus EK oder N aber nicht bestimmbar ist, dann soll die Maßnahme unterlassen werden, wenn gilt: (i) der schlimmst mögliche Schaden kann deutlich höher werden als der bestmögliche Nutzen und (ii) der schlimmst mögliche Schaden kann derart gravierend werden, dass er nicht ohne moralisch signifikante Benachteiligungen aufgefangen werden kann.
<span class="hljs-argument-statement-nr">(4)</span> Der erwartete Nutzen der Ausrichtung der Olympischen Spiele (und der Nutzen ihrer Unterlassung) ist nicht bestimmbar.
<span class="hljs-argument-statement-nr">(5)</span> Die maximal möglichen Verluste an gesamtgesellschaftlichem Nutzen aus der Ausrichtung der Olympischen Spiele -- ökologische Schäden sowie unerwartete finanzielle Belastungen -- können deutlich höher ausfallen als die maximal möglichen Gewinne -- Infrastrukturausbau, Sporterlebnisse, finanzielle Gewinne.
<span class="hljs-argument-statement-nr">(6)</span> Die maximal möglichen Verluste aus der Ausrichtung der Olympischen Spiele können derart gravierend werden, dass ihr Auffangen zu moralisch signifikanten Benachteiligungen führen wird. 
<span class="hljs-inference">----</span>
<span class="hljs-argument-statement-nr">(7)</span> <span class="hljs-statement-title">[Gegen-Olympia-Bewerbung]</span>
<span class="hljs-comment">&lt;!--
&lt;A6.1.1. Das IOC ist ein unfairer Kooperationspartner&gt;: Das IOC priorisiert das Ziel möglichst hoher Einnahmen durch die Olympischen Spiele.#(contra)

(1) Beim IOC spielt das Interesse, mit den Olympischen Spielen, möglichst hohe Einnahmen zu generieren, eine prioritäre Rolle.
(2) Wenn ein Ausrichter einer Veranstaltung das Ziel Z priorisiert, dann ist damit zu rechnen, dass der Ausrichter bei Zielkonflikten häufig für die Realisierung von Z entscheiden wird. 
(3) Bei der Festlegung des Konzepts der Olympischen Spiele zwischen der Stadt München und dem IOC ist mit zahlreichen Konflikten zwischen dem Finanzinteresse des IOC und den Zielen der Stadt München (Nachhaltigkeit, Kostenreduktion) zu rechnen. 
----
