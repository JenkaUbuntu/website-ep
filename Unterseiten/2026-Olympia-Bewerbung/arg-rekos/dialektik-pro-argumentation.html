<span class="hljs-statement-title">[Pro-Olympia-Bewerbung]:</span> Die Stadt München sollte sich um die Ausrichtung der Olympischen Spiele 2036/40/44 bewerben. <span class="hljs-tag">#(pro)</span>
<span class="hljs-comment">&lt;!--  &gt;&lt; [Gegen-Olympia-Bewerbung] --&gt;</span>

<span class="hljs-comment">&lt;!--
[Gegen-Olympia-Bewerbung]: Die Stadt München sollte sich nicht um die Ausrichtung der Olympischen Spiele 2036/40/44 bewerben. #(contra) --&gt;</span>

<span class="hljs-statement-title">[Alle unkontroversen Pro-Gesichtspunkte]:</span> Von der Ausrichtung der Olympischen Spiele in München sind folgende Vorteile zu erwarten: Förderung der Stadtentwicklung, Verbesserung der Inklusion durch Ausbau der Barrierefreiheit, Gewinne für die lokale Wirtschaft sowie einzigartige Erlebnisse für die Stadtbewohner<span class="hljs-meta">\*</span>innen. <span class="hljs-tag">#pro</span>

<span class="hljs-comment">&lt;!--
[Förderung der Stadtentwicklung] #pro
 +&gt; [Alle unkontroversen Pro-Gesichtspunkte]

[Verbesserung der Inklusion]#(pro)
 +&gt; [Alle unkontroversen Pro-Gesichtspunkte]

[Kurzfristige Gewinne für die lokale Wirtschaft]#(pro)
 +&gt; [Alle unkontroversen Pro-Gesichtspunkte]

[Einzigartige Erlebnisse]#(pro)
 +&gt; [Alle unkontroversen Pro-Gesichtspunkte]
--&gt;</span>


<span class="hljs-statement-title">[Alle unkontroversen Contra-Gesichtspunkte]:</span> Von der Ausrichtung der Olympischen Spiele in München sind folgende Nachteile zu erwarten: ihre Ausrichtung belastet den Stadthaushalt, sie birgt hohe finanzielle Risiken und die Ausrichtung erfordert Kooperation mit einem unfairen Partner, dem IOC.<span class="hljs-tag">#contra</span>

<span class="hljs-comment">&lt;!--
[Olympische Spiele kosten unverhältnismäßig viel]#(contra)
 +&gt; [Alle unkontroversen Contra-Gesichtspunkte]

[Das IOC ist ein unfairer Partner, mit dem nicht kooperiert werden sollte]#(contra)
 +&gt; [Alle unkontroversen Contra-Gesichtspunkte]

[Zusätzliche Kosten für den Stadthaushalt]#(contra)
 +&gt; [Olympische Spiele kosten unverhältnismäßig viel] 

[Finanzrisiken]#(contra)
 +&gt; [Olympische Spiele kosten unverhältnismäßig viel]

[Gefahr einer Abhängigkeit vom IOC] #contra
 +&gt; [Das IOC ist ein unfairer Partner, mit dem nicht kooperiert werden sollte]

[Unfaire Verteilung der Gewinne] #(contra)
 +&gt; [Das IOC ist ein unfairer Partner, mit dem nicht kooperiert werden sollte]
 --&gt;</span>


<span class="hljs-section">## Abwägungs-Argumentation</span>

<span class="hljs-argument-title">&lt;A1: Pro-Abwägung-1&gt;:</span> Vorteile aus der Ausrichtung von Olympischen Spielen überwiegen die Nachteile daraus.<span class="hljs-tag">#(pro)</span>

<span class="hljs-argument-statement-nr">(1)</span> <span class="hljs-statement-title">[Alle unkontroversen Pro-Gesichtspunkte]</span><span class="hljs-tag">#pro</span>
<span class="hljs-argument-statement-nr">(2)</span> <span class="hljs-statement-title">[Alle unkontroversen Contra-Gesichtspunkte]</span>
<span class="hljs-argument-statement-nr">(3)</span> <span class="hljs-statement-title">[Abwägungsprinzip]:</span> Wenn von einer Maßnahme M zu erwarten ist, dass sie sowohl erstrebenswerten Konsequenzen EK als auch zu Nachteilen N führen wird, soll die Maßnahme M genau dann durchgeführt werden, wenn gilt: (i)
das Herbeiführen der erwünschten Konsequenzen EK ist insgesamt besser als das Vermeiden der erwarteten Nachteile N und (ii) 
es gibt keinen anderen Weg als M, die Vorteile EK mit geringeren Nachteilen als N zu realisieren.
<span class="hljs-argument-statement-nr">(4)</span> <span class="hljs-statement-title">[Abwägung-1 Pro-Olympia]:</span> Trotz der benötigten Investitionen für die Ausrichtung der Olympischen Spiele, der damit verbundenen Finanzrisiken und der Risiken der Einflussnahme durch das IOC ist es insgesamt besser, die einzigartigen Erlebnisse, die mittel- bis langfristigen Vorteile aus dem Ausbau der städtischen Infrastruktur einschließlich der Barrierefreiheit sowie die zusätzlichen Gewinne für die lokale Wirtschaft zu realisieren.<span class="hljs-tag">#(pro)</span>
  <span class="hljs-comment">&lt;!--
  &lt;+ &lt;Nachteile-Debunking-Argument&gt;: Nachteile aus der Ausrichtung Olympischer Spiele sind vernachlässigbar #(pro)--&gt;</span>
<span class="hljs-support">  &lt;+</span> <span class="hljs-argument-title">&lt;A1.1: Erwartungswert-Argument&gt;:</span> Aggregation der Vorteile ist höher als das Aggregat der Nachteile.<span class="hljs-tag">#(pro)</span>
<span class="hljs-argument-statement-nr">(5)</span> <span class="hljs-statement-title">[Optimalität der Olympia-Bewerbung]:</span> Es gibt keinen anderen Weg, mit geringeren Nachteilen als denen, die durch eine erfolgreiche Olympia-Bewerbung entstehen können, die positiven Konsequenzen für die Stadt zu realisieren, die von der Ausrichtung der Olympischen Spiele zu erwarten sind.<span class="hljs-tag">#(pro)</span>
<span class="hljs-support"> &lt;+</span> <span class="hljs-argument-title">&lt;A1.2: Finanzielle Zuschüsse vom Land und Bund&gt;</span><span class="hljs-tag">#pro</span>
<span class="hljs-inference">----</span>
<span class="hljs-argument-statement-nr">(6)</span> <span class="hljs-statement-title">[Pro-Olympia-Bewerbung]</span>

<span class="hljs-argument-title">&lt;A1.1: Erwartungswert-Argument&gt;</span>

<span class="hljs-argument-statement-nr">(1)</span> <span class="hljs-statement-title">[Normative Grundlage: Erwarteter Nutzen]:</span> Das Herbeiführen der möglichen Vorteile einer Handlungsoption ist dann besser als das Vermeiden ihrer möglichen Nachteile,  wenn der erwartete gesamtgesellschaftliche Nutzen der möglichen Vorteile höher ist als der erwartete gesamtgesellschaftliche Schaden aus den möglichen Nachteilen. 
<span class="hljs-argument-statement-nr">(2)</span> Der erwartete gesamtgesellschaftliche Nutzen aus den möglichen Vorteilen der Ausrichtung Olympischer Spiele -- Infrastrukturausbau, einzigartige Erlebnisse, finanzielle Gewinne für die lokale Wirtschaft -- ist höher als der erwartete gesamtgesellschaftliche Schaden aus den möglichen Nachteilen der Ausrichtung (Kosten- und Finanzrisiken, Kooperation mit einem unfairen Partner). 
<span class="hljs-inference">----</span>
<span class="hljs-argument-statement-nr">(3)</span> <span class="hljs-statement-title">[Abwägung-1 Pro-Olympia]</span><span class="hljs-tag">#(pro)</span>


<span class="hljs-argument-title">&lt;A1.2: Finanzielle Zuschüsse vom Land und Bund&gt;</span><span class="hljs-tag">#pro</span>

<span class="hljs-argument-statement-nr">(1)</span> <span class="hljs-statement-title">[Zuschüsse vom Bund und Land]:</span> Genau dann, wenn die Stadt München den Zuschlag für die Ausrichtung der Olympischen Spiele bekommt, erhält sie finanzielle Zuschüsse vom Bund und Land für die Realisierung ihrer Infrastrukturprojekte.
<span class="hljs-inference">----</span>
<span class="hljs-argument-statement-nr">(2)</span> Wenn die Stadt München ihre Infrastrukturprojekte umsetzt und nicht die Olympischen Spiele ausrichtet, erhält sie keine finanziellen Zuschüsse vom Land und Bund.
<span class="hljs-argument-statement-nr">(3)</span> Realisierung von Infrastrukturprojekten der Stadt München ohne die Zuschüsse vom Land und Bund führt zu höherer Belastung von Stadthaushalt.
<span class="hljs-argument-statement-nr">(4)</span> Wenn die Stadt München ihre Infrastrukturprojekte umsetzt und nicht die Olympischen Spiele ausrichtet, geht sie keine Risiken aus der Kooperation mit dem IOC.
<span class="hljs-inference">----</span>
<span class="hljs-argument-statement-nr">(5)</span> Wenn die Stadt München ihre Infrastrukturprojekte umsetzt und nicht die Olympischen Spiele ausrichtet, wird das Stadthaushalt höher belastet und es gibt keine Risiken aus der Kooperation mit dem IOC.
<span class="hljs-argument-statement-nr">(6)</span> <span class="hljs-statement-title">[Finanzielle Zuschüsse wichtiger als Risiken IOC-Kooperation]:</span> Die zusätzliche Belastung des Stadthaushalts (durch den Wegfall der Zuschüsse) hat insgesamt höhere Nachteile als das Tragen der Risiken aus der Kooperation mit dem IOC.
<span class="hljs-inference">----</span>
<span class="hljs-argument-statement-nr">(7)</span> Wenn die Stadt München ihre Infrastrukturprojekte umsetzt und nicht die Olympischen Spiele ausrichtet, hat sie größere Nachteile als wenn sie die Olympischen Spiele ausrichtet und dabei die Infrastrukturprojekte umsetzt.
<span class="hljs-argument-statement-nr">(8)</span> Entweder wird die Stadt München ihre Infrastrukturprojekte realisieren und Olympische Spiele ausrichten oder sie wird sie realisieren und keine Olympischen Spiele ausrichten.
<span class="hljs-inference">----</span>
<span class="hljs-argument-statement-nr">(9)</span> <span class="hljs-statement-title">[Optimalität der Olympia-Bewerbung]:</span> Es ist nicht möglich, die Vorteile der Ausrichtung der Olympischen Spiele zu realisieren (Infrastrukturprojekte) und geringere Nachteile als denen, die durch eine erfolgreiche Olympia-Bewerbung entstehen können (Risiken aus der Kooperation mit dem IOC), in Kauf zu nehmen.

<span class="hljs-section">### Argumentation unter hoher Ungewissheit</span>

<span class="hljs-argument-title">&lt;A2: Argument der Chancen-Ergreifung&gt;</span><span class="hljs-tag">#pro</span>

<span class="hljs-argument-statement-nr">(1)</span> <span class="hljs-statement-title">[Alle unkontroversen Pro-Gesichtspunkte]</span>
<span class="hljs-argument-statement-nr">(2)</span> <span class="hljs-statement-title">[Alle unkontroversen Contra-Gesichtspunkte]</span>
<span class="hljs-argument-statement-nr">(3)</span> <span class="hljs-statement-title">[Normative Grundlage: Prinzip der Chancenergreifung]:</span> Wenn von einer Maßnahme M zu erwarten ist, dass sie sowohl erstrebenswerten Konsequenzen EK als auch zu Nachteilen N führen wird, der erwartete Nutzen bzw. Schaden aus EK oder N aber nicht bestimmbar ist, dann soll M ergriffen werden, wenn gilt: (i) der potentielle Gewinn an gesamtgesellschaftlichem Nutzen aus der Realisierung der Handlungsoption ist insgesamt höher ist als der mögliche Verlust an gesamtgesellschaftlichem Nutzen aus der Realisierung und (ii) die möglichen Verluste aus der Realisierung der Handlungsoption können so aufgeteilt werden, dass niemand von den Betroffenen moralisch signifikant benachteiligt wird und (iii) es gibt keinen anderen Weg als M, die maximal möglichen Vorteile EK mit geringeren Nachteilen als N zu realisieren.
<span class="hljs-argument-statement-nr">(4)</span> Maximal mögliche Gewinne an gesamtgesellschaftlichem Nutzen aus der Ausrichtung der Olympischen Spiele in München -- Infrastrukturausbau, Sporterlebnisse, finanzielle Gewinne -- sind höher als die maximal möglichen Verluste an gesamtgesellschaftlichen Nutzen (Kosten und Finanzrisiken, Risiken aus der Kooperation mit dem IOC).
<span class="hljs-argument-statement-nr">(5)</span> Die möglichen Verluste an gesamtgesellschaftlichem Nutzen aus der Ausrichtung der Olympischen Spiele (unerwartete finanzielle Belastungen) können, sollten sie auftreten, so aufgeteilt werden, dass dadurch niemand moralisch signifikant benachteil igt wird. 
<span class="hljs-argument-statement-nr">(6)</span> Der erwartete Nutzen der Ausrichtung der Olympischen Spiele (und der Nutzen ihrer Unterlassung) ist nicht bestimmbar.
<span class="hljs-argument-statement-nr">(7)</span> <span class="hljs-statement-title">[Optimalität der Olympia-Bewerbung]</span>
<span class="hljs-inference">----</span>
<span class="hljs-argument-statement-nr">(5)</span> <span class="hljs-statement-title">[Pro-Olympia-Bewerbung]</span>

<span class="hljs-section">## Nachteile-Zurückweisung </span>

<span class="hljs-argument-title">&lt;A3: Pro-Abwägung-2&gt;:</span> Ausrichtung der Olympischen Spiele bringt zahlreiche Vorteile und kaum signifikante Nachteile.<span class="hljs-tag">#pro</span>

<span class="hljs-argument-statement-nr">(1)</span> <span class="hljs-statement-title">[Alle unkontroversen Pro-Gesichtspunkte]</span>
<span class="hljs-argument-statement-nr">(2)</span> <span class="hljs-statement-title">[Nachteile nicht signifikant]:</span> Die aus der Ausrichtung der Olympischen Spiele befürchteten Nachteile -- Finanzrisiken, Kooperation mit dem IOC und Ausrichtungskosten -- sind nicht gewichtig.<span class="hljs-tag">#(pro)</span>
<span class="hljs-contradiction">  &gt;&lt;</span> <span class="hljs-statement-title">[Alle unkontroversen Contra-Gesichtspunkte]</span>
<span class="hljs-support">  &lt;+</span> <span class="hljs-argument-title">&lt;A3.1: Finanzrisiken überschaubar&gt;</span><span class="hljs-tag">#pro</span>
<span class="hljs-support">  &lt;+</span> <span class="hljs-argument-title">&lt;A3.2: Ausrichtungskosten sind tragbar&gt;</span><span class="hljs-tag">#pro</span>
<span class="hljs-support">  &lt;+</span> <span class="hljs-argument-title">&lt;A3.3: IOC ist ein vertrauenswürdiger Kooperationspartner&gt;</span> <span class="hljs-tag">#pro</span>
<span class="hljs-argument-statement-nr">(3)</span> <span class="hljs-statement-title">[Abwägungsprinzip]</span>
<span class="hljs-argument-statement-nr">(4)</span> <span class="hljs-statement-title">[Abwägung Pro-Olympia 2]:</span>  Ausrichtung der Olympischen Spiele in München bringt signifikante Vorteile und kaum Nachteile.<span class="hljs-tag">#(pro)</span>
<span class="hljs-argument-statement-nr">(5)</span> <span class="hljs-statement-title">[Optimalität der Olympia-Bewerbung]</span>
<span class="hljs-inference">----</span>
<span class="hljs-argument-statement-nr">(3)</span> <span class="hljs-statement-title">[Pro-Olympia-Bewerbung]</span>

<span class="hljs-argument-title">&lt;A3.3: IOC ist ein vertrauenswürdiger Kooperationspartner&gt;:</span> Es ist nicht zu erwarten, dass das IOC auf eine untragbare Weise das Ausrichtungskonzept der Stadt München beeinflusst.
<span class="hljs-attack">  -&gt;</span> <span class="hljs-statement-title">[Alle unkontroversen Contra-Gesichtspunkte]</span>

<span class="hljs-argument-title">&lt;A3.1: Finanzrisiken überschaubar&gt;:</span> Es ist nicht zu erwarten, dass die Ausrichtung der Olympischen Spiele dem Stadthaushalt unerwartete Kosten aufbürdet.<span class="hljs-tag">#(pro)</span>
<span class="hljs-attack">  -&gt;</span> <span class="hljs-statement-title">[Alle unkontroversen Contra-Gesichtspunkte]</span>

<span class="hljs-argument-title">&lt;A3.2: Ausrichtungskosten sind tragbar&gt;:</span> Es ist nicht zu erwarten, dass die Finanzierung der Ausrichtung der Olympischen Spiele dazu führt, dass andere Haushaltsposten der Stadt München hierfür gekürzt werden.<span class="hljs-tag">#pro</span>
<span class="hljs-attack">  -&gt;</span> <span class="hljs-statement-title">[Alle unkontroversen Contra-Gesichtspunkte]</span>

<text text-anchor="start" x="517.05" y="-599.79" font-family="arial" font-weight="bold" font-size="10.00" fill="#000000">Abwägung&#45;1 Pro&#45;Olympia</text>
<text text-anchor="start" x="487.13" y="-582.79" font-family="arial" font-size="10.00" fill="#000000">Trotz der benötigten Investitionen für</text>
<text text-anchor="start" x="499.26" y="-570.79" font-family="arial" font-size="10.00" fill="#000000"> die Ausrichtung der Olympischen</text>
<text text-anchor="start" x="504.53" y="-558.79" font-family="arial" font-size="10.00" fill="#000000"> Spiele, der damit verbundenen</text>
<text text-anchor="start" x="498.43" y="-546.79" font-family="arial" font-size="10.00" fill="#000000"> Finanzrisiken und der Risiken der</text>
<text text-anchor="start" x="493.15" y="-534.79" font-family="arial" font-size="10.00" fill="#000000"> Einflussnahme durch das IOC ist es</text>
<text text-anchor="start" x="494.26" y="-522.79" font-family="arial" font-size="10.00" fill="#000000"> insgesamt besser, die einzigartigen</text>
<text text-anchor="start" x="517.05" y="-510.79" font-family="arial" font-size="10.00" fill="#000000"> Erlebnisse, die mittel&#45; bis</text>
<text text-anchor="start" x="488.42" y="-498.79" font-family="arial" font-size="10.00" fill="#000000"> langfristigen Vorteile aus dem Ausbau</text>
<text text-anchor="start" x="510.93" y="-486.79" font-family="arial" font-size="10.00" fill="#000000"> der städtischen Infrastruktur</text>
<text text-anchor="start" x="499.83" y="-474.79" font-family="arial" font-size="10.00" fill="#000000"> einschließlich der Barrierefreiheit</text>
<text text-anchor="start" x="482.88" y="-462.79" font-family="arial" font-size="10.00" fill="#000000"> sowie die zusätzlichen Gewinne für die</text>
<text text-anchor="start" x="503.44" y="-450.79" font-family="arial" font-size="10.00" fill="#000000"> lokale Wirtschaft zu realisieren.</text>
</g>

<text text-anchor="start" x="85.6" y="-668.79" font-family="arial" font-weight="bold" font-size="10.00" fill="#000000">Normative Grundlage:</text>
<text text-anchor="start" x="109.22" y="-658.79" font-family="arial" font-weight="bold" font-size="10.00" fill="#000000"> Prinzip der</text>
<text text-anchor="start" x="90.6" y="-648.79" font-family="arial" font-weight="bold" font-size="10.00" fill="#000000"> Chancenergreifung</text>
<text text-anchor="start" x="39.76" y="-633.79" font-family="arial" font-size="10.00" fill="#000000">Wenn von einer Maßnahme M zu erwarten</text>
<text text-anchor="start" x="50.04" y="-621.79" font-family="arial" font-size="10.00" fill="#000000"> ist, dass sie sowohl erstrebenswerten</text>
<text text-anchor="start" x="40.02" y="-609.79" font-family="arial" font-size="10.00" fill="#000000"> Konsequenzen EK als auch zu Nachteilen</text>
<text text-anchor="start" x="50.05" y="-597.79" font-family="arial" font-size="10.00" fill="#000000"> N führen wird, der erwartete Nutzen</text>
<text text-anchor="start" x="44.47" y="-585.79" font-family="arial" font-size="10.00" fill="#000000"> bzw. Schaden aus EK oder N aber nicht</text>
<text text-anchor="start" x="52.55" y="-573.79" font-family="arial" font-size="10.00" fill="#000000"> bestimmbar ist, dann soll M ergriffen</text>
<text text-anchor="start" x="54.21" y="-561.79" font-family="arial" font-size="10.00" fill="#000000"> werden, wenn gilt: (i) der potentielle</text>
<text text-anchor="start" x="50.6" y="-549.79" font-family="arial" font-size="10.00" fill="#000000"> Gewinn an gesamtgesellschaftlichem</text>
<text text-anchor="start" x="61.43" y="-537.79" font-family="arial" font-size="10.00" fill="#000000"> Nutzen aus der Realisierung der</text>
<text text-anchor="start" x="49.3" y="-525.79" font-family="arial" font-size="10.00" fill="#000000"> Handlungsoption ist insgesamt höher</text>
<text text-anchor="start" x="64.86" y="-513.79" font-family="arial" font-size="10.00" fill="#000000"> ist als der mögliche Verlust an</text>
<text text-anchor="start" x="49.2" y="-501.79" font-family="arial" font-size="10.00" fill="#000000"> gesamtgesellschaftlichem Nutzen aus</text>
<text text-anchor="start" x="71.99" y="-489.79" font-family="arial" font-size="10.00" fill="#000000"> der Realisierung und (ii) die</text>
<text text-anchor="start" x="70.97" y="-477.79" font-family="arial" font-size="10.00" fill="#000000"> möglichen Verluste aus der</text>
<text text-anchor="start" x="57.82" y="-465.79" font-family="arial" font-size="10.00" fill="#000000"> Realisierung der Handlungsoption</text>
<text text-anchor="start" x="55.68" y="-453.79" font-family="arial" font-size="10.00" fill="#000000"> können so aufgeteilt werden, dass</text>
<text text-anchor="start" x="44.75" y="-441.79" font-family="arial" font-size="10.00" fill="#000000"> niemand von den Betroffenen moralisch</text>
<text text-anchor="start" x="61.15" y="-429.79" font-family="arial" font-size="10.00" fill="#000000"> signifikant benachteiligt wird und</text>
<text text-anchor="start" x="55.04" y="-417.79" font-family="arial" font-size="10.00" fill="#000000"> (iii) es gibt keinen anderen Weg als</text>
<text text-anchor="start" x="47.37" y="-405.79" font-family="arial" font-size="10.00" fill="#000000"> M, die maximal möglichen Vorteile EK</text>
<text text-anchor="start" x="56.71" y="-393.79" font-family="arial" font-size="10.00" fill="#000000"> mit geringeren Nachteilen als N zu</text>
<text text-anchor="start" x="108.67" y="-381.79" font-family="arial" font-size="10.00" fill="#000000"> realisieren.</text>
</g>

<text text-anchor="start" x="1136.82" y="-560.79" font-family="arial" font-size="10.00" fill="#000000">Von der Ausrichtung der Olympischen</text>
