<span class="hljs-statement-title">[Gegen-Olympia-Bewerbung]:</span> Die Stadt München sollte sich nicht um die Ausrichtung der Olympischen Spiele 2036/40/44 bewerben. <span class="hljs-tag">#(contra)</span>

<span class="hljs-section">## Unstrittige Pro-Gesichtspunkte</span>

<span class="hljs-statement-title">[Förderung der Stadtentwicklung]</span> <span class="hljs-tag">#pro</span>
<span class="hljs-comment">&lt;!-- &lt;+ [Finanzielle Zuschüsse vom Bund und Land] --&gt;</span>

<span class="hljs-statement-title">[Verbesserung der Inklusion]</span><span class="hljs-tag">#(pro)</span>

[Finanzielle Zuschüsse vom Bund und Land]#(pro)--&gt;</span>


<span class="hljs-section">## Unstrittige Einwände</span>

<span class="hljs-statement-title">[Alle unkontroversen Contra-Gesichtspunkte]</span><span class="hljs-tag">#contra</span>

<span class="hljs-statement-title">[Olympische Spiele kosten unverhältnismäßig viel]</span><span class="hljs-tag">#(contra)</span>
<span class="hljs-support"> +&gt;</span> <span class="hljs-statement-title">[Alle unkontroversen Contra-Gesichtspunkte]</span>

<span class="hljs-statement-title">[Das IOC ist ein unfairer Partner, mit dem nicht kooperiert werden sollte]</span><span class="hljs-tag">#(contra)</span>

<span class="hljs-statement-title">[Die Ausrichtung Olympischer Spiele führt zu unverhältnismäßig hohen ökologischen Belastungen]</span><span class="hljs-tag">#contra</span>
<span class="hljs-support">  +&gt;</span> <span class="hljs-statement-title">[Alle unkontroversen Contra-Gesichtspunkte]</span>


<span class="hljs-section">## Bessere Alternative zu Olympischen Spielen</span>

<span class="hljs-argument-title">&lt;A5: Bessere Alternative&gt;:</span> Es ist besser, die Stadtinfrastruktur unabhängig von der Ausrichtung Olympischer Spiele auszubauen.<span class="hljs-tag">#contra</span>

<span class="hljs-argument-statement-nr">(1)</span> <span class="hljs-statement-title">[Alle unkontroversen Pro-Gesichtspunkte]</span>
<span class="hljs-argument-statement-nr">(2)</span> <span class="hljs-statement-title">[Alle unkontroversen Contra-Gesichtspunkte]</span>
<span class="hljs-argument-statement-nr">(3)</span> <span class="hljs-statement-title">[Abwägungsprinzip]:</span> Wenn von einer Maßnahme M zu erwarten ist, dass sie sowohl erstrebenswerten Konsequenzen EK als auch zu Nachteilen N führen wird, soll die Maßnahme M genau dann durchgeführt werden, wenn gilt: (i) das Herbeiführen der erwünschten Konsequenzen EK ist insgesamt besser als das Vermeiden der erwarteten Nachteile N und (ii) es gibt keinen anderen Weg als M, die Vorteile EK mit geringeren Nachteilen als N zu realisieren.
<span class="hljs-argument-statement-nr">(4)</span> <span class="hljs-statement-title">[Bessere Alternative]:</span> Wenn die Stadt München die Infrastrukturvorhaben, die sie im Zuge der Olympia-Ausrichtung realisieren will, vollständig selbst finanziert, hat sie insgesamt geringere Nachteile zu tragen als durch ihre Realisierung mittels Olympia-Ausrichtung, auch wenn dadurch auf einmalige Erlebnisse verzichtet wird.<span class="hljs-tag">#(contra)</span>
<span class="hljs-inference">----</span>
<span class="hljs-argument-statement-nr">(5)</span> <span class="hljs-statement-title">[Gegen-Olympia-Bewerbung]</span>

<span class="hljs-argument-title">&lt;A5.1: Infrastrukturausbau unabhängig von Olympia&gt;:</span> Es ist besser für die Stadt München, ihre Infrastrukturmaßnahmen selbst zu finanzieren.<span class="hljs-tag">#(contra)</span>

<span class="hljs-argument-statement-nr">(1)</span> Wenn die Stadt München ihre Infrastrukturprojekte umsetzt und nicht die Olympischen Spiele ausrichtet, wird das Stadthaushalt höher belastet und es gibt keine Risiken aus der Kooperation mit dem IOC.
<span class="hljs-support"> &lt;+</span> <span class="hljs-argument-title">&lt;A5.1.1: Ohne Olympia-Ausrichtung keine Zuschüsse&gt;</span>
<span class="hljs-argument-statement-nr">(2)</span> <span class="hljs-statement-title">[Risiken der IOC-Kooperation schlimmer als Verzicht auf finanzielle Zuschüsse]:</span> Die zusätzliche Belastung des Stadthaushalts (durch den Wegfall der Zuschüsse) für die Realisierung der Infrastrukturvorhaben ist insgesamt leichter zu bewältigen als das Tragen der Risiken aus der Kooperation mit dem IOC.<span class="hljs-tag">#(contra)</span>
<span class="hljs-inference">----</span>
<span class="hljs-argument-statement-nr">(3)</span> Wenn die Stadt München ihre Infrastrukturprojekte umsetzt und nicht die Olympischen Spiele ausrichtet, hat sie größere Nachteile als wenn sie die Olympischen Spiele ausrichtet und dabei die Infrastrukturprojekte umsetzt.
<span class="hljs-inference">----</span>
<span class="hljs-argument-statement-nr">(4)</span> <span class="hljs-statement-title">[Bessere Alternative]:</span> Wenn die Stadt München die Infrastrukturvorhaben, die sie im Zuge der Olympia-Ausrichtung realisieren will, vollständig selbst finanziert, hat sie insgesamt geringere Nachteile zu tragen als durch ihre Realisierung mittels Olympia-Ausrichtung, auch wenn dadurch auf einmalige Erlebnisse verzichtet wird.<span class="hljs-tag">#(contra)</span>

<span class="hljs-argument-title">&lt;A5.1.1: Ohne Olympia-Ausrichtung keine Zuschüsse&gt;:</span> Wenn die Stadt München ihre Infrastrukturprojekte umsetzt und nicht die Olympischen Spiele ausrichtet, wird das Stadthaushalt höher belastet und es gibt keine Risiken aus der Kooperation mit dem IOC.

<span class="hljs-argument-statement-nr">(1)</span> <span class="hljs-statement-title">[Zuschüsse vom Bund und Land]:</span> Genau dann, wenn die Stadt München den Zuschlag für die Ausrichtung der Olympischen Spiele bekommt, erhält sie finanzielle Zuschüsse vom Bund und Land für die Realisierung ihrer Infrastrukturprojekte.
<span class="hljs-inference">----</span>
<span class="hljs-argument-statement-nr">(2)</span> Wenn die Stadt München ihre Infrastrukturprojekte umsetzt und nicht die Olympischen Spiele ausrichtet, erhält sie keine finanziellen Zuschüsse vom Land und Bund.
<span class="hljs-argument-statement-nr">(3)</span> Realisierung von Infrastrukturprojekten der Stadt München ohne die Zuschüsse vom Land und Bund führt zu höherer Belastung von Stadthaushalt.
<span class="hljs-argument-statement-nr">(4)</span> Wenn die Stadt München ihre Infrastrukturprojekte umsetzt und nicht die Olympischen Spiele ausrichtet, geht sie keine Risiken aus der Kooperation mit dem IOC.
<span class="hljs-inference">----</span>

<text text-anchor="start" x="865.94" y="-689.92" font-family="arial" font-weight="bold" font-size="10.00" fill="#000000">Abwägungsprinzip</text>
<text text-anchor="start" x="811.76" y="-672.92" font-family="arial" font-size="10.00" fill="#000000">Wenn von einer Maßnahme M zu erwarten</text>
<text text-anchor="start" x="822.04" y="-660.92" font-family="arial" font-size="10.00" fill="#000000"> ist, dass sie sowohl erstrebenswerten</text>
<text text-anchor="start" x="812.02" y="-648.92" font-family="arial" font-size="10.00" fill="#000000"> Konsequenzen EK als auch zu Nachteilen</text>
<text text-anchor="start" x="820.94" y="-636.92" font-family="arial" font-size="10.00" fill="#000000"> N führen wird, soll die Maßnahme M</text>
<text text-anchor="start" x="812.86" y="-624.92" font-family="arial" font-size="10.00" fill="#000000"> genau dann durchgeführt werden, wenn</text>
<text text-anchor="start" x="839.27" y="-612.92" font-family="arial" font-size="10.00" fill="#000000"> gilt: (i) das Herbeiführen der</text>
<text text-anchor="start" x="823.7" y="-600.92" font-family="arial" font-size="10.00" fill="#000000"> erwünschten Konsequenzen EK ist</text>
<text text-anchor="start" x="814.54" y="-588.92" font-family="arial" font-size="10.00" fill="#000000"> insgesamt besser als das Vermeiden der</text>
<text text-anchor="start" x="830.94" y="-576.92" font-family="arial" font-size="10.00" fill="#000000"> erwarteten Nachteile N und (ii) es</text>
<text text-anchor="start" x="826.76" y="-564.92" font-family="arial" font-size="10.00" fill="#000000"> gibt keinen anderen Weg als M, die</text>
<text text-anchor="start" x="821.76" y="-552.92" font-family="arial" font-size="10.00" fill="#000000"> Vorteile EK mit geringeren Nachteilen</text>
<text text-anchor="start" x="861.22" y="-540.92" font-family="arial" font-size="10.00" fill="#000000"> als N zu realisieren.</text>
</g>

<text text-anchor="start" x="640.16" y="-671.92" font-family="arial" font-weight="bold" font-size="10.00" fill="#000000">Bessere Alternative</text>
<text text-anchor="start" x="615.43" y="-654.92" font-family="arial" font-size="10.00" fill="#000000">Wenn die Stadt München die</text>
<text text-anchor="start" x="597.93" y="-642.92" font-family="arial" font-size="10.00" fill="#000000"> Infrastrukturvorhaben, die sie im Zuge</text>
<text text-anchor="start" x="602.66" y="-630.92" font-family="arial" font-size="10.00" fill="#000000"> der Olympia&#45;Ausrichtung realisieren</text>
<text text-anchor="start" x="611.55" y="-618.92" font-family="arial" font-size="10.00" fill="#000000"> will, vollständig selbst finanziert,</text>
<text text-anchor="start" x="598.48" y="-606.92" font-family="arial" font-size="10.00" fill="#000000"> hat sie insgesamt geringere Nachteile</text>
<text text-anchor="start" x="600.71" y="-594.92" font-family="arial" font-size="10.00" fill="#000000"> zu tragen als durch ihre Realisierung</text>
<text text-anchor="start" x="592.93" y="-582.92" font-family="arial" font-size="10.00" fill="#000000"> mittels Olympia&#45;Ausrichtung, auch wenn</text>
<text text-anchor="start" x="608.21" y="-570.92" font-family="arial" font-size="10.00" fill="#000000"> dadurch auf einmalige Erlebnisse</text>
<text text-anchor="start" x="648.78" y="-558.92" font-family="arial" font-size="10.00" fill="#000000"> verzichtet wird.</text>
</g>

<text text-anchor="start" x="838.37" y="-209.96" font-family="arial" font-size="10.00" fill="#000000"> leichter zu bewältigen als das Tragen</text>

<text text-anchor="start" x="636.54" y="-302.96" font-family="arial" font-weight="bold" font-size="10.00" fill="#000000">A5.1.1: Ohne</text>
