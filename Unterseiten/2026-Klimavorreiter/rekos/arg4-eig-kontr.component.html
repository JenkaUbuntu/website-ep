<link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/@argdown/web-components@latest/dist/argdown-map.css"><script src="https://cdn.jsdelivr.net/npm/@webcomponents/webcomponentsjs/webcomponents-bundle.js" type="module"></script><script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@argdown/web-components@latest/dist/argdown-map.js"></script><figure  role="group" class="argdown-figure"><argdown-map  withoutLogo='true' initialView="map"><div slot="source" class=""><pre class="language-argdown"><code class="language-argdown"><span class="hljs-section"># Das Argument für die Vorreiterrolle</span>

<span class="hljs-statement-title">[Klimaschutz auch als nationaler Alleingang]:</span> Deutschland soll seine Treibhausgasemissionen signifikant reduzieren, selbst wenn es kein international koordinierten Klimaschutz gibt, der die Umsetzung hinreichend absichert. <span class="hljs-tag">#pro</span>

<span class="hljs-statement-title">[Nationaler Klimaschutz nur bei globaler Koordination]:</span> Deutschland soll seine Treibhausgasemissionen erst dann signifikant reduzieren, wenn es eine glaubwürdige internationale Kooperation gibt. <span class="hljs-tag">#contra</span>

<span class="hljs-argument-title">&lt;Unilaterale Klimapolitik&gt;:</span> &quot;in Situationen, in denen die Gefahr nicht sicher abgewandt werden kann, muss ggf. auf Abwehrmaßnahmen zurückgegriffen werden, die unsicher sind.&quot; <span class="hljs-tag">.?.</span> <span class="hljs-tag">#unkl</span> 

<span class="hljs-section">## Behauptungen, die unkontrovers sein sollten</span>

<span class="hljs-statement-title">[Wirksamkeit nationaler Reduktionen]:</span> Wenn Deutschland unilateral Klimaschutzmaßnahmen ergreift (z<span class="hljs-tag">.B.</span> Erhöhung der CO2-Steuer), dann wird das Ausmaß der katastrophalen Auswirkungen des Klimawandels unterproportional verringert. <span class="hljs-tag">.y.</span> <span class="hljs-tag">#pro</span>

<span class="hljs-statement-title">[Wirksamkeit Vorreiterrolle]:</span> Wenn Deutschland unilateral Klimaschutzmaßnahmen ergreift (z<span class="hljs-tag">.B.</span> Erhöhung der CO2-Steuer), dann ist es möglich, dass die unilaterale Klimaschutzpolitik Nachahmer in anderen Ländern findet. <span class="hljs-tag">.y.</span> <span class="hljs-tag">#pro</span>

<span class="hljs-statement-title">[Handlungsprinzip]:</span> Wenn (i) katastrophale Folgen kollektiven Handelns nur im Kollektiv vermieden werden können und wenn (ii) es wenig aussichtsreich ist, dass hinreichend viele Parteien sich zum kollektiven Handeln zusammenschließen und wenn (iii) einzelne Mitglieder des Kollektivs über Handlungsoptionen verfügen, mit denen das Ausmaß der katastrophalen Folgen gemindert wird und es möglich bleibt, dass kollektives Handeln induziert wird, und wenn (iv) das Ausführen dieser Handlungsoptionen keine ungerechte Belastungen für die Akteure mit sich bringen, dann sollen die einzelnen Akteure die ihnen zur Verfügung stehenden Handlungsoptionen ausüben. <span class="hljs-tag">.y.</span>

<span class="hljs-section">## Kontroverse Behauptungen</span>

<span class="hljs-statement-title">[Verhältnismäßigkeit]:</span> Deutschland kann seine THG-Emissionen signifikant im nationalen Alleingang reduzieren, ohne dass seine Bewohner<span class="hljs-meta">\*</span>innen dadurch unverhältnismäßig hohe Nachteile tragen müssen: z<span class="hljs-tag">.B.</span> durch CO2-Bepreisung und Umverteilung der Einnahmen. <span class="hljs-tag">.?.</span> <span class="hljs-tag">#unkl</span>

<span class="hljs-argument-title">&lt;Klimaschutzpolitik im nationalen Alleingang bringt unverhältnismäßig hohe Belastungen&gt;:</span> ambitionierte Klimaschutzpolitik wird zu signifikanten Belastungen aller Bürger<span class="hljs-meta">\*</span>innen führen und eine finanzielle Kompensation wird nicht alle moralisch signifikanten Benachteiligungen ausgleichen können. <span class="hljs-tag">.?.</span> <span class="hljs-tag">#unkl</span>
<span class="hljs-attack">  -&gt;</span> <span class="hljs-statement-title">[Verhältnismäßigkeit]</span>



<span class="hljs-argument-title">&lt;Unilaterale Klimapolitik&gt;:</span> &quot;in Situationen, in denen die Gefahr nicht sicher abgewandt werden kann, muss ggf. auf Abwehrmaßnahmen zurückgegriffen werden, die unsicher sind.&quot; <span class="hljs-tag">.?.</span> <span class="hljs-tag">#unkl</span> 

<span class="hljs-argument-statement-nr">(1)</span> <span class="hljs-statement-title">[Handlungsprinzip]:</span> Wenn (i) katastrophale Folgen kollektiven Handelns nur im Kollektiv vermieden werden können und wenn (ii) es wenig aussichtsreich ist, dass hinreichend viele Parteien sich zum kollektiven Handeln zusammenschließen und wenn (iii) einzelne Mitglieder des Kollektivs über Handlungsoptionen verfügen, mit denen das Ausmaß der katastrophalen Folgen gemindert wird und es möglich bleibt, dass kollektives Handeln induziert wird, und wenn (iv) das Ausführen dieser Handlungsoptionen keine ungerechte Belastungen für die Akteure mit sich bringen, dann sollen die einzelnen Akteure die ihnen zur Verfügung stehenden Handlungsoptionen ausüben. <span class="hljs-tag">.y.</span>
<span class="hljs-argument-statement-nr">(2)</span> Moralisch inakzeptable Folgen des Klimawandels können mit Sicherheit nur durch international koordiniertes Handeln vermieden werden.
<span class="hljs-argument-statement-nr">(3)</span> Es ist wenig aussichtsreich, dass ein global koordinierter Klimaschutz im hinreichend starken Maße gelingt. <span class="hljs-tag">.y.</span>
<span class="hljs-argument-statement-nr">(4)</span> <span class="hljs-statement-title">[Wirksamkeit nationaler Reduktionen]:</span> Wenn Deutschland unilateral Klimaschutzmaßnahmen ergreift (z<span class="hljs-tag">.B.</span> Erhöhung der CO2-Steuer), dann wird das Ausmaß der katastrophalen Auswirkungen des Klimawandels unterproportional verringert. <span class="hljs-tag">.y.</span> <span class="hljs-tag">#pro</span>
<span class="hljs-argument-statement-nr">(5)</span> <span class="hljs-statement-title">[Wirksamkeit Vorreiterrolle]:</span> Wenn Deutschland unilateral Klimaschutzmaßnahmen ergreift (z<span class="hljs-tag">.B.</span> Erhöhung der CO2-Steuer), dann ist es möglich, dass die unilaterale Klimaschutzpolitik Nachahmer in anderen Ländern findet. <span class="hljs-tag">.y.</span> <span class="hljs-tag">#pro</span>
<span class="hljs-argument-statement-nr">(6)</span> <span class="hljs-statement-title">[Verhältnismäßigkeit]:</span> Deutschland kann seine THG-Emissionen signifikant im nationalen Alleingang reduzieren, ohne dass seine Bewohner<span class="hljs-meta">\*</span>innen dadurch unverhältnismäßig hohe Nachteile tragen müssen: z<span class="hljs-tag">.B.</span> durch CO2-Bepreisung und Umverteilung der Einnahmen. <span class="hljs-tag">.?.</span> <span class="hljs-tag">#unkl</span>
<span class="hljs-inference">----</span>
<span class="hljs-argument-statement-nr">(7)</span> <span class="hljs-statement-title">[Klimaschutz auch als nationaler Alleingang]:</span> Deutschland soll seine Treibhausgasemissionen signifikant reduzieren, selbst wenn es kein international koordinierten Klimaschutz gibt, der die Umsetzung hinreichend absichert. <span class="hljs-tag">#pro</span>

## Gefahrenabwendung unter Unsicherheit

&lt;Teil 1: Gefahrenabwendung unter Unsicherheit-1&gt;: in Situationen, in denen die Gefahr nicht sicher abgewandt werden kann, muss ggf. auf Abwehrmaßnahmen zurückgegriffen werden, die unsicher sind. (S. 93) #pro 

(1) Moralisch inakzeptable Folgen des Klimawandels können mit Sicherheit nur durch international koordiniertes Handeln vermieden werden.
(2) Es ist wenig aussichtsreich, dass ein global koordinierter Klimaschutz im hinreichend starken Maße gelingt. 
(3) In Situationen, in denen die Gefahr nicht sicher abgewandt werden kann, muss auf Abwehrmaßnahmen zurückgegriffen werden, die unsicher sind. (S. 93)
----
(4) [Klimaschutzpolitik erfordert unsichere Abwehrmaßnahmen]: Um die Gefahr aus den Folgen des Klimawandels abzuwenden, muss auf Abwehrmaßnahmen zurückgegriffen werden, die unsicher sind.
 +&gt; &lt;Teil 2: Klimaschutz in Deutschland ist eine mögliche Abwehrmaßnahme&gt;

&lt;Teil 2: Klimaschutz in Deutschland ist eine mögliche Abwehrmaßnahme&gt;

(1) Um die Gefahr aus den Folgen des Klimawandels abzuwenden, muss auf Abwehrmaßnahmen zurückgegriffen werden, die unsicher sind.
(2) Je gravierender diese Schäden aus einer Gefahr G sind, desto eher sind zu ihrer Abwendung auch Maßnahmen prima facie geboten, die zumindest eine Chance bieten, die Realisierung der betreffenden Gefahr zu verhindern oder ihr Ausmaß zu verkleinern. (S. 93)
(3) Ungebremster Klimawandel wird katastrophale Folgen für die in der Zukunft lebende Menschheit mit sich bringen.
(4) [Nationale Klimaschutzpolitik ist wirksam]: Substantielle Reduktion der THG-Emissionen in einem Staat wie Deutschland verkleinert mit Sicherheit das Ausmaß der Klimaschäden um einen geringen Beitrag und es ist möglich, wenn auch wenig verlässlich, dass es Nachahmung bei anderen Staaten auslöst, durch die das Ausmaß der Klimaschäden signifikant sinkt. 
----
(5) Es ist prima facie geboten, dass Deutschland seine THG-Emissionen signifikant reduziert.
 +&gt; &lt;Teil 3: Klimaschutzpolitik im nationalen Alleingang ist verhältnismäßig&gt;

&lt;Teil 3: Klimaschutzpolitik im nationalen Alleingang ist verhältnismäßig&gt;

(1) Es ist prima facie geboten, dass Deutschland seine THG-Emissionen signifikant reduziert. 
(2) [Verhältnismäßigkeit]: Wenn es prima facie geboten ist, dass ein Akteur eine Maßnahmen M unternimmt und der Akteur kann M umsetzen, ohne dass es ihm unverhältnismäßig hohe Nachteile bringt, dann ist es geboten, dass der Akteur M unternimmt.
(3) Deutschland kann seine THG-Emissionen signifikant im nationalen Alleingang reduzieren, ohne dass seine Bewohner\*innen dadurch unverhältnismäßig hohe Nachteile tragen müssen: z.B. durch CO2-Bepreisung und Umverteilung der Einnahmen.
----
(4) [Klimaschutz auch als nationaler Alleingang]

&quot;die Bemühungen um effektivere internationale Klimaschutzabkommen (würden) ohne zeitgleiche nationale bzw. europäische Anstrengungen politisch unglaubwürdig&quot; (94)&quot;

&lt;Vorreiter-Rolle notwendig für globale Kooperation&gt;: Ohne ambitionierten nationalen bzw. europäischen Klimaschutz wird es kein effektives internationales Klimaschutzhandeln geben. 

(1) Damit eine globale Kooperation für die Erreichung der Pariser Klimaziele zustande kommt, ist es notwendig, dass das wohlhabende und zum Klimawandel überproportional viel beitragendes Land Deutschland seine Treibhausgasemissionen hinreichend stark reduziert. 
(2) Moralisch inakzeptable Folgen des Klimawandels können mit Sicherheit nur durch international koordiniertes Handeln vermieden werden.
(3) Wenn für die Erreichung eines moralisch gebotenen Ziels es notwendig ist, dass p, dann ist es prima facie moralisch geboten, dass p.

(4) Es ist prima facie moralisch geboten, dass das wohlhabende und zum Klimawandel überproportional viel beitragendes Land Deutschland seine Treibhausgasemissionen hinreichend stark reduziert.
(5) Wenn es prima facie moralisch geboten ist, dass ein Akteur A q tut, und die Ausführung von q keine überproportional hohen Kosten für A mit sich bringt, dann hat A die moralische Pflicht, q zu tun.

----
(7) [Klimaschutz auch als nationaler Alleingang]


&lt;Vorreiter-Rolle erleichtert die Realisierung der internationalen Kooperation&gt;: Deutschlands Vorreiter-Rolle beim Klimaschutz erhöht signifikant die Chancen, dass es zu einer effektiven internationalen Klimaschutzpolitik kommt. 

(1) Wenn das wohlhabende und zum Klimawandel überproportional viel beitragendes Land Deutschland seine Treibhausgasemissionen hinreichend stark reduziert, steigen die Chancen, dass es zu einer effektiven internationalen Klimaschutzpolitik kommt.
(2) Katastrophale Auswirkungen des Klimawandels können nur durch eine effektive internationale Klimaschutzpolitik vermieden werden.
(3) [Abwägung-1]: Wenn ein Akteur A durch die Maßnahme M die Chancen auch nur geringfügig erhöht, dass katastrophale Folgen vermieden werden, dann hat A die moralische Pflicht, M zu tun, wenn die folgenden Bedingungen erfüllt sind: (i) Realisierung der Maßnahme M bürdet A keine moralisch signifikante Benachteiligungen auf; (ii) es ist nahezu ausgeschlossen, dass die katastrophalen Folgen auf eine andere Weise verhindert werden, die geringere Benachteiligungen für A mit sich bringt &lt;!-- (iii) es gibt keinen anderen Weg für A, zur Vermeidung katastrophaler Folgen beizutragen, als M. (Diese Bedingung hier nicht nötig, da es ja nur ein Beitrag ist)--&gt;</span><span class="hljs-comment">&lt;!--
