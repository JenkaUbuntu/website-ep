<link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/@argdown/web-components@latest/dist/argdown-map.css"><script src="https://cdn.jsdelivr.net/npm/@webcomponents/webcomponentsjs/webcomponents-bundle.js" type="module"></script><script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@argdown/web-components@latest/dist/argdown-map.js"></script><figure  role="group" class="argdown-figure"><argdown-map  withoutLogo='true' initialView="map"><div slot="source" class=""><pre class="language-argdown"><code class="language-argdown"><span class="hljs-argument-title">&lt;Unilaterale Klimapolitik als letztes Mittel zur Gefahrenabwendung&gt;:</span> &quot;in Situationen, in denen die Gefahr nicht sicher abgewandt werden kann, muss ggf. auf Abwehrmaßnahmen zurückgegriffen werden, die unsicher sind.&quot; <span class="hljs-tag">#pro</span> 

<span class="hljs-argument-statement-nr">(1)</span> <span class="hljs-statement-title">[Handlungsprinzip]:</span> Wenn (i) katastrophale Folgen kollektiven Handelns nur im Kollektiv vermieden werden können und wenn (ii) es wenig aussichtsreich ist, dass hinreichend viele Parteien sich zum kollektiven Handeln zusammenschließen und wenn (iii) einzelne Mitglieder des Kollektivs über Handlungsoptionen verfügen, mit denen das Ausmaß der katastrophalen Folgen gemindert wird und die es erleichtern, dass  kollektives Handeln induziert wird, und wenn (iv) das Ausführen dieser Handlungsoptionen keine ungerechte Belastungen für die Akteure mit sich bringen, dann sollen die einzelnen Akteure die ihnen zur Verfügung stehenden Handlungsoptionen ausüben. 
<span class="hljs-argument-statement-nr">(2)</span> Moralisch inakzeptable Folgen des Klimawandels können mit Sicherheit nur durch international koordiniertes Handeln vermieden werden.
<span class="hljs-argument-statement-nr">(3)</span> Es ist wenig aussichtsreich, dass ein global koordinierter Klimaschutz im hinreichend starken Maße gelingt. 
<span class="hljs-argument-statement-nr">(4)</span> <span class="hljs-statement-title">[Wirksamkeit nationaler Reduktionen]:</span> Wenn Deutschland unilateral Klimaschutzmaßnahmen ergreift (z<span class="hljs-tag">.B.</span> Erhöhung der CO2-Steuer), dann wird das Ausmaß der katastrophalen Auswirkungen des Klimawandels verringert. <span class="hljs-tag">#pro</span>
<span class="hljs-argument-statement-nr">(5)</span> <span class="hljs-statement-title">[Wirksamkeit Vorreiterrolle]:</span> Wenn Deutschland unilateral Klimaschutzmaßnahmen ergreift (z<span class="hljs-tag">.B.</span> Erhöhung der CO2-Steuer), dann wird erleichtert, dass die unilaterale Klimaschutzpolitik Nachahmer in anderen Ländern findet.<span class="hljs-tag">#pro</span>
<span class="hljs-argument-statement-nr">(6)</span> <span class="hljs-statement-title">[Verhältnismäßigkeit]:</span> Deutschland kann seine THG-Emissionen signifikant im nationalen Alleingang reduzieren, ohne dass seine Bewohner<span class="hljs-meta">\*</span>innen dadurch unverhältnismäßig hohe Nachteile tragen müssen: z<span class="hljs-tag">.B.</span> durch CO2-Bepreisung und Umverteilung der Einnahmen. <span class="hljs-tag">#pro</span>
<span class="hljs-inference">----</span>
<span class="hljs-argument-statement-nr">(7)</span> <span class="hljs-statement-title">[Klimaschutz auch als nationaler Alleingang]:</span> : Deutschland soll seine Treibhausgasemissionen signifikant reduzieren, selbst wenn es kein international koordinierten Klimaschutz gibt, der die Umsetzung hinreichend absichert. <span class="hljs-tag">#pro</span>

<span class="hljs-section"># Gegen die Vorreiter Rolle </span>

<span class="hljs-section">## Unwirksamkeits-Einwände</span>

<span class="hljs-argument-title">&lt;Nationale Klimaschutzpolitik senkt nicht die globalen Treibhausgasemissionen&gt;:</span> Wegen des Leakage-Effekts führt eine Verringerung der lokalen THG-Emissionen infolge sinkender Preise für THG-Emissionen keinen Effekt auf die Höhe der globalen THG-Emissionen, unter Umständen sogar einen negativen Effekt (i<span class="hljs-tag">.e.</span> höhere Emissionen).<span class="hljs-tag">#contra</span>
<span class="hljs-attack"> -&gt;</span> <span class="hljs-statement-title">[Wirksamkeit nationaler Reduktionen]</span>

<span class="hljs-argument-title">&lt;Nationale Klimaschutzpolitik löst keine internationale Nachahmung aus&gt;:</span> &quot;Die Idee, dass reduktionsstarke Nationen anderen zum Vorbild werden, steht auf keinem wissenschaftlich validen Fundament.&quot; (Rostalski 2025, S. 58) <span class="hljs-tag">#contra</span>
<span class="hljs-attack"> -&gt;</span> <span class="hljs-statement-title">[Wirksamkeit Vorreiterrolle]</span>
 
<span class="hljs-section">## Unverhältnismäßigkeit</span>
 
<span class="hljs-argument-title">&lt;Klimaschutzpolitik im nationalen Alleingang bringt unverhältnismäßig hohe Belastungen&gt;:</span> ambitionierte Klimaschutzpolitik wird zu signifikanten Belastungen aller Bürger<span class="hljs-meta">\*</span>innen führen und eine finanzielle Kompensation wird nicht alle moralisch signifikanten Benachteiligungen ausgleichen können <span class="hljs-tag">#contra</span>
<span class="hljs-attack">  -&gt;</span> <span class="hljs-statement-title">[Verhältnismäßigkeit]</span></code></pre></div><div slot="map"><?xml version="1.0" encoding="UTF-8" standalone="no"?>
