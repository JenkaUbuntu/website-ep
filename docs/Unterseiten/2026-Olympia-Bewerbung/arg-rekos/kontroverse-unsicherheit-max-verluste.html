--&gt;</span>

<span class="hljs-statement-title">[Pro-Olympia-Bewerbung]:</span> Die Stadt München sollte sich um die Ausrichtung der Olympischen Spiele 2036/40/44 bewerben. <span class="hljs-tag">#(pro)</span>
<span class="hljs-comment">&lt;!--  &gt;&lt; [Gegen-Olympia-Bewerbung] --&gt;</span>

<span class="hljs-statement-title">[Gegen-Olympia-Bewerbung]:</span> Die Stadt München sollte sich nicht um die Ausrichtung der Olympischen Spiele 2036/40/44 bewerben. <span class="hljs-tag">#(contra)</span> 

<span class="hljs-section"># Ausgangspunkt: Erwartete Vor- und Nachteile aus der Durchführung der Olympischen Spiele</span>

<span class="hljs-statement-title">[Alle unkontroversen Pro-Gesichtspunkte]:</span> Von der Ausrichtung der Olympischen Spiele in München sind folgende Vorteile zu erwarten: Förderung der Stadtentwicklung, Verbesserung der Inklusion durch Ausbau der Barrierefreiheit, Gewinne für die lokale Wirtschaft sowie einzigartige Erlebnisse für die Stadtbewohner<span class="hljs-meta">\*</span>innen. <span class="hljs-tag">#pro</span>

<span class="hljs-statement-title">[Alle unkontroversen Contra-Gesichtspunkte]:</span> Von der Ausrichtung der Olympischen Spiele in München sind folgende Nachteile zu erwarten: ihre Ausrichtung belastet den Stadthaushalt, sie birgt hohe finanzielle Risiken und die Ausrichtung erfordert Kooperation mit einem unfairen Partner, dem IOC.<span class="hljs-tag">#contra</span>

<span class="hljs-comment">&lt;!-- 
# Empirische Bedingungen

[Zuschüsse vom Bund und Land]: Genau dann, wenn die Stadt München den Zuschlag für die Ausrichtung der Olympischen Spiele bekommt, erhält sie finanzielle Zuschüsse vom Bund und Land für die Realisierung ihrer Infrastrukturprojekte. #neutral

&lt;A1.3.1: Ohne Olympia-Ausrichtung keine Zuschüsse&gt;: Infrastrukturausbau ohne Olympia-Zuschüsse belastet den Stadthaushalt stärker aber vermeidet Risiken aus der Kooperation mit dem IOC.#neutral

(1) [Zuschüsse vom Bund und Land]: Genau dann, wenn die Stadt München den Zuschlag für die Ausrichtung der Olympischen Spiele bekommt, erhält sie finanzielle Zuschüsse vom Bund und Land für die Realisierung ihrer Infrastrukturprojekte.
----
(2) Wenn die Stadt München ihre Infrastrukturprojekte umsetzt und nicht die Olympischen Spiele ausrichtet, erhält sie keine finanziellen Zuschüsse vom Land und Bund.
(3) Realisierung von Infrastrukturprojekten der Stadt München ohne die Zuschüsse vom Land und Bund führt zu höherer Belastung von Stadthaushalt.
(4) Wenn die Stadt München ihre Infrastrukturprojekte umsetzt und nicht die Olympischen Spiele ausrichtet, geht sie keine Risiken aus der Kooperation mit dem IOC.
----
(5) Wenn die Stadt München ihre Infrastrukturprojekte umsetzt und nicht die Olympischen Spiele ausrichtet, wird das Stadthaushalt höher belastet und es gibt keine Risiken aus der Kooperation mit dem IOC.
--&gt;</span>
<span class="hljs-section"># Neutrale Entscheidungsprinzipien</span>

<span class="hljs-statement-title">[Normative Grundlage: Prinzip der Chancenergreifung]:</span> Wenn von einer Maßnahme M zu erwarten ist, dass sie sowohl erstrebenswerten Konsequenzen EK als auch zu Nachteilen N führen wird, der erwartete Nutzen bzw. Schaden aus EK oder N aber nicht bestimmbar ist, dann soll M ergriffen werden, wenn gilt: (i) der potentielle Gewinn an gesamtgesellschaftlichem Nutzen aus der Realisierung der Handlungsoption ist insgesamt höher ist als der mögliche Verlust an gesamtgesellschaftlichem Nutzen aus der Realisierung und (ii) die möglichen Verluste aus der Realisierung der Handlungsoption können so aufgeteilt werden, dass niemand von den Betroffenen moralisch signifikant benachteiligt wird und (iii) es gibt keinen anderen Weg als M, die maximal möglichen Vorteile EK mit geringeren Nachteilen als N zu realisieren.

<span class="hljs-statement-title">[Vorsorgeprinzip]:</span> Wenn von einer Maßnahme M zu erwarten ist, dass sie sowohl erstrebenswerten Konsequenzen EK als auch zu Nachteilen N führen wird, der erwartete Nutzen bzw. Schaden aus EK oder N aber nicht bestimmbar ist, dann soll die Maßnahme unterlassen werden, wenn gilt: (i) der schlimmst mögliche Schaden kann deutlich höher werden als der bestmögliche Nutzen und (ii) der schlimmst mögliche Schaden kann derart gravierend werden, dass er nicht ohne moralisch signifikante Benachteiligungen aufgefangen werden kann.

<span class="hljs-argument-statement-nr">(1)</span> <span class="hljs-statement-title">[Alle unkontroversen Pro-Gesichtspunkte]</span>
<span class="hljs-argument-statement-nr">(2)</span> <span class="hljs-statement-title">[Alle unkontroversen Contra-Gesichtspunkte]</span>
<span class="hljs-argument-statement-nr">(3)</span> <span class="hljs-statement-title">[Normative Grundlage: Prinzip der Chancenergreifung]:</span> Wenn von einer Maßnahme M zu erwarten ist, dass sie sowohl erstrebenswerten Konsequenzen EK als auch zu Nachteilen N führen wird, der erwartete Nutzen bzw. Schaden aus EK oder N aber nicht bestimmbar ist, dann soll M ergriffen werden, wenn gilt: (i) der potentielle Gewinn an gesamtgesellschaftlichem Nutzen aus der Realisierung der Handlungsoption ist insgesamt höher ist als der mögliche Verlust an gesamtgesellschaftlichem Nutzen aus der Realisierung und (ii) die möglichen Verluste aus der Realisierung der Handlungsoption können so aufgeteilt werden, dass niemand von den Betroffenen moralisch signifikant benachteiligt wird und (iii) es gibt keinen anderen Weg als M, die maximal möglichen Vorteile EK mit geringeren Nachteilen als N zu realisieren.
<span class="hljs-argument-statement-nr">(4)</span> Maximal mögliche Gewinne an gesamtgesellschaftlichem Nutzen aus der Ausrichtung der Olympischen Spiele in München -- Infrastrukturausbau, Sporterlebnisse, finanzielle Gewinne -- sind höher als die maximal möglichen Verluste an gesamtgesellschaftlichen Nutzen (Kosten und Finanzrisiken, Risiken aus der Kooperation mit dem IOC).
<span class="hljs-argument-statement-nr">(5)</span> <span class="hljs-statement-title">[Mögliche Verluste sind tragbar]:</span> Die möglichen Verluste an gesamtgesellschaftlichem Nutzen aus der Ausrichtung der Olympischen Spiele (unerwartete finanzielle Belastungen) können, sollten sie auftreten, so aufgeteilt werden, dass dadurch niemand moralisch signifikant benachteiligt wird. <span class="hljs-tag">#(wid)</span>
<span class="hljs-contradiction">  &gt;&lt;</span> <span class="hljs-statement-title">[maximale Verluste gravierend]</span>
<span class="hljs-support">  &lt;+</span> <span class="hljs-argument-title">&lt;Strategie zum fairen Aufteilen möglicher Verluste&gt;:</span> ❓ 😞 <span class="hljs-tag">#(unkl)</span>
<span class="hljs-argument-statement-nr">(6)</span> Der erwartete Nutzen der Ausrichtung der Olympischen Spiele (und der Nutzen ihrer Unterlassung) ist nicht bestimmbar. 
<span class="hljs-argument-statement-nr">(7)</span>  <span class="hljs-statement-title">[Optimalität der Olympia-Bewerbung]:</span> Es gibt keinen anderen Weg, mit geringeren Nachteilen als denen, die durch eine erfolgreiche Olympia-Bewerbung entstehen können, die positiven Konsequenzen für die Stadt zu realisieren, die von der Ausrichtung der Olympischen Spiele zu erwarten sind.<span class="hljs-tag">#(pro)</span> <span class="hljs-meta">{isInMap: false}</span>
<span class="hljs-inference">----</span>

<span class="hljs-argument-title">&lt;A6 Risiken-Minimierung&gt;:</span> die schlimmst möglichen Nachteile aus einer Kooperation mit dem IOC sind derart gravierend, dass es insgesamt besser ist, sie gar nicht zuzulassen.<span class="hljs-tag">#(contra)</span>

<span class="hljs-argument-statement-nr">(3)</span> <span class="hljs-statement-title">[Vorsorgeprinzip]:</span> Wenn von einer Maßnahme M zu erwarten ist, dass sie sowohl erstrebenswerten Konsequenzen EK als auch zu Nachteilen N führen wird, der erwartete Nutzen bzw. Schaden aus EK oder N aber nicht bestimmbar ist, dann soll die Maßnahme unterlassen werden, wenn gilt: (i) der schlimmst mögliche Schaden kann deutlich höher werden als der bestmögliche Nutzen und (ii) der schlimmst mögliche Schaden kann derart gravierend werden, dass er nicht ohne moralisch signifikante Benachteiligungen aufgefangen werden kann.
<span class="hljs-argument-statement-nr">(4)</span> Der erwartete Nutzen der Ausrichtung der Olympischen Spiele (und der Nutzen ihrer Unterlassung) ist nicht bestimmbar.
<span class="hljs-argument-statement-nr">(5)</span> <span class="hljs-statement-title">[Maximale Verluste deutlich höher als potentielle  Gewinne]:</span> Die maximal möglichen Verluste an gesamtgesellschaftlichem Nutzen aus der Ausrichtung der Olympischen Spiele -- ökologische Schäden sowie unerwartete finanzielle Belastungen -- können deutlich höher ausfallen als die maximal möglichen Gewinne -- Infrastrukturausbau, Sporterlebnisse, finanzielle Gewinne.<span class="hljs-tag">#(contra)</span> <span class="hljs-meta">{isInMap: false}</span>
<span class="hljs-argument-statement-nr">(6)</span> <span class="hljs-statement-title">[maximale Verluste gravierend]:</span> Die maximal möglichen Verluste aus der Ausrichtung der Olympischen Spiele können derart gravierend werden, dass ihr Auffangen zu moralisch signifikanten Benachteiligungen führen wird.<span class="hljs-tag">#(wid)</span> 
<span class="hljs-inference">----</span>
<span class="hljs-argument-statement-nr">(7)</span> <span class="hljs-statement-title">[Gegen-Olympia-Bewerbung]</span>


<span class="hljs-section">## Stützargumente</span>


<span class="hljs-argument-title">&lt;A6.1.1. Das IOC ist ein unfairer Kooperationspartner&gt;:</span> Das IOC priorisiert das Ziel möglichst hoher Einnahmen durch die Olympischen Spiele.<span class="hljs-tag">#(contra)</span>

<span class="hljs-argument-statement-nr">(1)</span> Beim IOC spielt das Interesse, mit den Olympischen Spielen, möglichst hohe Einnahmen zu generieren, eine prioritäre Rolle.
<span class="hljs-argument-statement-nr">(2)</span> Wenn ein Ausrichter einer Veranstaltung das Ziel Z priorisiert, dann ist damit zu rechnen, dass der Ausrichter bei Zielkonflikten häufig für die Realisierung von Z entscheiden wird. 
<span class="hljs-argument-statement-nr">(3)</span> <span class="hljs-statement-title">[Interessenskonflikte zwischen IOC und Stadt München]:</span> Bei der Festlegung des Konzepts der Olympischen Spiele zwischen der Stadt München und dem IOC ist mit zahlreichen Konflikten zwischen dem Finanzinteresse des IOC und den Zielen der Stadt München (Nachhaltigkeit, Kostenreduktion) zu rechnen. ❓ 😞 <span class="hljs-tag">#unkl</span>
<span class="hljs-inference">----</span>
<span class="hljs-argument-statement-nr">(4)</span> <span class="hljs-statement-title">[Risiko aus der Gewinnorientierung des IOC]:</span> Bei der Festlegung des Konzepts der Olympischen Spiele ist damit zu rechnen, dass das IOC auf zahlreichen Lösungen besteht, die die IOC-Einnahmen maximieren und die Spiele für die Stadt München teurer  und weniger nachhaltig machen. <span class="hljs-tag">#(contra)</span>

<text text-anchor="start" x="271.82" y="-697.86" font-family="arial" font-weight="bold" font-size="10.00" fill="#000000">Alle unkontroversen</text>
<text text-anchor="start" x="263.49" y="-687.86" font-family="arial" font-weight="bold" font-size="10.00" fill="#000000"> Contra&#45;Gesichtspunkte</text>
<text text-anchor="start" x="231.81" y="-672.86" font-family="arial" font-size="10.00" fill="#000000">Von der Ausrichtung der Olympischen</text>
<text text-anchor="start" x="238.48" y="-660.86" font-family="arial" font-size="10.00" fill="#000000"> Spiele in München sind folgende</text>

<text text-anchor="start" x="251.25" y="-624.86" font-family="arial" font-size="10.00" fill="#000000"> Stadthaushalt, sie birgt hohe</text>
<text text-anchor="start" x="256.82" y="-612.86" font-family="arial" font-size="10.00" fill="#000000"> finanzielle Risiken und die</text>
<text text-anchor="start" x="231.54" y="-600.86" font-family="arial" font-size="10.00" fill="#000000"> Ausrichtung erfordert Kooperation mit</text>
<text text-anchor="start" x="239.6" y="-588.86" font-family="arial" font-size="10.00" fill="#000000"> einem unfairen Partner, dem IOC.</text>

<text text-anchor="start" x="737.94" y="-781.86" font-family="arial" font-weight="bold" font-size="10.00" fill="#000000">Normative Grundlage: Prinzip</text>
<text text-anchor="start" x="750.99" y="-771.86" font-family="arial" font-weight="bold" font-size="10.00" fill="#000000"> der Chancenergreifung</text>
<text text-anchor="start" x="708.76" y="-756.86" font-family="arial" font-size="10.00" fill="#000000">Wenn von einer Maßnahme M zu erwarten</text>
<text text-anchor="start" x="719.04" y="-744.86" font-family="arial" font-size="10.00" fill="#000000"> ist, dass sie sowohl erstrebenswerten</text>
<text text-anchor="start" x="709.02" y="-732.86" font-family="arial" font-size="10.00" fill="#000000"> Konsequenzen EK als auch zu Nachteilen</text>
<text text-anchor="start" x="719.05" y="-720.86" font-family="arial" font-size="10.00" fill="#000000"> N führen wird, der erwartete Nutzen</text>
<text text-anchor="start" x="713.47" y="-708.86" font-family="arial" font-size="10.00" fill="#000000"> bzw. Schaden aus EK oder N aber nicht</text>
<text text-anchor="start" x="721.55" y="-696.86" font-family="arial" font-size="10.00" fill="#000000"> bestimmbar ist, dann soll M ergriffen</text>
<text text-anchor="start" x="723.21" y="-684.86" font-family="arial" font-size="10.00" fill="#000000"> werden, wenn gilt: (i) der potentielle</text>
<text text-anchor="start" x="719.6" y="-672.86" font-family="arial" font-size="10.00" fill="#000000"> Gewinn an gesamtgesellschaftlichem</text>
<text text-anchor="start" x="730.43" y="-660.86" font-family="arial" font-size="10.00" fill="#000000"> Nutzen aus der Realisierung der</text>
<text text-anchor="start" x="718.3" y="-648.86" font-family="arial" font-size="10.00" fill="#000000"> Handlungsoption ist insgesamt höher</text>
<text text-anchor="start" x="733.86" y="-636.86" font-family="arial" font-size="10.00" fill="#000000"> ist als der mögliche Verlust an</text>
<text text-anchor="start" x="718.2" y="-624.86" font-family="arial" font-size="10.00" fill="#000000"> gesamtgesellschaftlichem Nutzen aus</text>
<text text-anchor="start" x="740.99" y="-612.86" font-family="arial" font-size="10.00" fill="#000000"> der Realisierung und (ii) die</text>
<text text-anchor="start" x="739.97" y="-600.86" font-family="arial" font-size="10.00" fill="#000000"> möglichen Verluste aus der</text>
<text text-anchor="start" x="726.82" y="-588.86" font-family="arial" font-size="10.00" fill="#000000"> Realisierung der Handlungsoption</text>
<text text-anchor="start" x="724.68" y="-576.86" font-family="arial" font-size="10.00" fill="#000000"> können so aufgeteilt werden, dass</text>
<text text-anchor="start" x="713.75" y="-564.86" font-family="arial" font-size="10.00" fill="#000000"> niemand von den Betroffenen moralisch</text>
<text text-anchor="start" x="730.15" y="-552.86" font-family="arial" font-size="10.00" fill="#000000"> signifikant benachteiligt wird und</text>
<text text-anchor="start" x="724.04" y="-540.86" font-family="arial" font-size="10.00" fill="#000000"> (iii) es gibt keinen anderen Weg als</text>
<text text-anchor="start" x="716.37" y="-528.86" font-family="arial" font-size="10.00" fill="#000000"> M, die maximal möglichen Vorteile EK</text>
<text text-anchor="start" x="725.71" y="-516.86" font-family="arial" font-size="10.00" fill="#000000"> mit geringeren Nachteilen als N zu</text>
<text text-anchor="start" x="777.67" y="-504.86" font-family="arial" font-size="10.00" fill="#000000"> realisieren.</text>
</g>

<text text-anchor="start" x="995.5" y="-735.86" font-family="arial" font-weight="bold" font-size="10.00" fill="#000000">Vorsorgeprinzip</text>
<text text-anchor="start" x="935.76" y="-718.86" font-family="arial" font-size="10.00" fill="#000000">Wenn von einer Maßnahme M zu erwarten</text>
<text text-anchor="start" x="946.04" y="-706.86" font-family="arial" font-size="10.00" fill="#000000"> ist, dass sie sowohl erstrebenswerten</text>
<text text-anchor="start" x="936.02" y="-694.86" font-family="arial" font-size="10.00" fill="#000000"> Konsequenzen EK als auch zu Nachteilen</text>
<text text-anchor="start" x="946.05" y="-682.86" font-family="arial" font-size="10.00" fill="#000000"> N führen wird, der erwartete Nutzen</text>
<text text-anchor="start" x="940.47" y="-670.86" font-family="arial" font-size="10.00" fill="#000000"> bzw. Schaden aus EK oder N aber nicht</text>
<text text-anchor="start" x="939.1" y="-658.86" font-family="arial" font-size="10.00" fill="#000000"> bestimmbar ist, dann soll die Maßnahme</text>
<text text-anchor="start" x="947.15" y="-646.86" font-family="arial" font-size="10.00" fill="#000000"> unterlassen werden, wenn gilt: (i) der</text>
<text text-anchor="start" x="950.58" y="-634.86" font-family="arial" font-size="10.00" fill="#000000"> schlimmst mögliche Schaden kann</text>
<text text-anchor="start" x="961.97" y="-622.86" font-family="arial" font-size="10.00" fill="#000000"> deutlich höher werden als der</text>
<text text-anchor="start" x="955.59" y="-610.86" font-family="arial" font-size="10.00" fill="#000000"> bestmögliche Nutzen und (ii) der</text>
<text text-anchor="start" x="936.14" y="-598.86" font-family="arial" font-size="10.00" fill="#000000"> schlimmst mögliche Schaden kann derart</text>
<text text-anchor="start" x="944.09" y="-586.86" font-family="arial" font-size="10.00" fill="#000000"> gravierend werden, dass er nicht ohne</text>
<text text-anchor="start" x="981.33" y="-574.86" font-family="arial" font-size="10.00" fill="#000000"> moralisch signifikante</text>
<text text-anchor="start" x="941.02" y="-562.86" font-family="arial" font-size="10.00" fill="#000000"> Benachteiligungen aufgefangen werden</text>
<text text-anchor="start" x="1016.88" y="-550.86" font-family="arial" font-size="10.00" fill="#000000"> kann.</text>
</g>
